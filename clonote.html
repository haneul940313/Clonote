<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Clonote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --paper: #fbfbf8;
      --paper-r: #f8f8f5;
      --line: rgba(132,184,196,.62);
      --red-line: rgba(208,112,112,.42);
      --spine-mid: #e0dcd4;
      --spine-edge: #ccc8c0;
      --text: #2f2f2f;
      --muted: #8a8a8a;
      --sat: #5d86c8;
      --sun: #d06f6f;
      --accent: #5d86c8;
      --pending: #c67a00;
      --saved: #4b8b55;
      --row-h: 26px;
      --left-date: 52px;
      --left-margin: 60px;
      --right-date: 44px;
      --right-margin: 52px;
      --total-w: 26px;
      --topbar-h: 42px;
      --status-h: 18px;
      --spine-w: 18px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .book {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,.1);
    }

    .top {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      padding: 0 14px;
      background: linear-gradient(to right, var(--paper) 0%, var(--paper) 50%, var(--paper-r) 50%, var(--paper-r) 100%);
      border-bottom: 1px solid rgba(132,184,196,.22);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      min-width: 0;
      flex-wrap: nowrap;
    }

    .btn, .menu-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      color: #3a3630;
      flex-shrink: 0;
    }

    .btn {
      font-size: 22px;
      font-weight: 700;
      width: 28px;
      height: 28px;
    }

    .menu-btn {
      font-size: 18px;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .month {
      font-size: 14px;
      font-weight: 700;
      min-width: 82px;
      text-align: center;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .divider {
      width: 1px;
      height: 16px;
      background: rgba(0,0,0,.11);
      margin: 0 8px;
      flex-shrink: 0;
    }

    .user {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .save-guide {
      font-size: 10px;
      color: #8d8d8d;
      font-style: italic;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 2px;
    }

    .menu-wrap { position: relative; flex-shrink: 0; }

    .menu-pop {
      display: none;
      position: absolute;
      top: 30px;
      right: 0;
      min-width: 92px;
      background: #fff;
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
      padding: 5px;
      z-index: 50;
    }

    .menu-pop.show { display: block; }

    .menu-item {
      width: 100%;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 7px;
      text-align: left;
      padding: 0 10px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .login {
      display: none;
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(0,0,0,.07);
      border-radius: 10px;
      padding: 10px 12px;
      margin: 4px 10px;
    }

    .login.show { display: block; }

    .guide {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .login-row {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
    }

    .inp {
      height: 30px;
      border: 1px solid rgba(0,0,0,.09);
      border-radius: 7px;
      padding: 0 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
      flex: 1;
      min-width: 80px;
    }

    .text-btn {
      height: 30px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(0,0,0,.07);
      border-radius: 7px;
      background: rgba(255,255,255,.55);
      cursor: pointer;
    }

    .login-status {
      min-height: 14px;
      font-size: 11px;
      color: #666;
      margin-top: 3px;
    }

    .spread {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .page {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      padding: 0 14px;
    }

    .left {
      background-color: var(--paper);
      background-image:
        linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--left-margin) - 1px),
          var(--red-line) calc(var(--left-margin) - 1px),
          var(--red-line) calc(var(--left-margin) + 1px),
          transparent calc(var(--left-margin) + 1px)
        ),
        linear-gradient(
          to bottom,
          transparent calc(var(--row-h) - 1px),
          var(--line) calc(var(--row-h) - 1px),
          var(--line) var(--row-h)
        );
      background-repeat: no-repeat, repeat-y;
      background-size: 100% 100%, 100% var(--row-h);
      background-position: 0 0, 0 0;
    }

    .right {
      background-color: var(--paper-r);
      background-image:
        linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--right-margin) - 1px),
          var(--red-line) calc(var(--right-margin) - 1px),
          var(--red-line) calc(var(--right-margin) + 1px),
          transparent calc(var(--right-margin) + 1px)
        ),
        linear-gradient(
          to bottom,
          transparent calc(var(--row-h) - 1px),
          var(--line) calc(var(--row-h) - 1px),
          var(--line) var(--row-h)
        );
      background-repeat: no-repeat, repeat-y;
      background-size: 100% 100%, 100% var(--row-h);
      background-position: 0 0, 0 0;
    }

    .spine {
      width: var(--spine-w);
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      background: linear-gradient(to right, var(--spine-edge), var(--spine-mid), var(--spine-edge));
    }

    .spine::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 2px;
      right: 2px;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 10px,
        rgba(0,0,0,.06) 10px,
        rgba(0,0,0,.06) 11px
      );
    }

    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--row-h);
      padding: 0 2px;
    }

    .page-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .tabs {
      display: flex;
      gap: 2px;
    }

    .tab {
      border: none;
      background: transparent;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      padding: 3px 7px;
      border-radius: 5px;
      cursor: pointer;
    }

    .tab.active {
      background: rgba(93,134,200,.14);
      color: var(--accent);
    }

    .memo-row, .setup-row {
      display: grid;
      grid-template-columns: var(--left-date) 1fr;
      height: var(--row-h);
      align-items: center;
    }

    .setup-row { grid-template-columns: var(--right-date) 1fr; }

    .day {
      height: var(--row-h);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #777;
      user-select: none;
      cursor: pointer;
    }

    .day.sat { color: var(--sat); }
    .day.sun { color: var(--sun); }
    .day.pending { color: var(--pending); }
    .day.saved { color: var(--saved); }
    .day.passive { cursor: default; }

    .memo-cell, .setup-cell {
      display: flex;
      align-items: center;
      height: var(--row-h);
      padding: 0 6px;
      position: relative;
      overflow: hidden;
    }

    .memo-input, .setup-input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 13px;
      color: var(--text);
    }

    .save-ind {
      position: absolute;
      right: 2px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      color: #9a9a9a;
      opacity: 0;
    }

    .save-ind.show { opacity: 1; }

    .habit-hdr, .check-row {
      display: grid;
      align-items: center;
      height: var(--row-h);
    }

    .hdr, .total, .cb {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hdr {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .total {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
    }

    .cb input {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
    }

    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--row-h);
      padding-left: var(--right-date);
    }

    .week-lbl {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
    }

    .w-btn {
      border: none;
      background: transparent;
      color: #999;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      padding: 0 4px;
    }

    .graph-wrap { overflow: hidden; }

    .status {
      height: var(--status-h);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #888;
      background: linear-gradient(to right, var(--paper) 0%, var(--paper) 50%, var(--paper-r) 50%, var(--paper-r) 100%);
      border-top: 1px solid rgba(132,184,196,.22);
    }

    @media (max-width: 640px) {
      :root {
        --topbar-h: 44px;
        --row-h: 30px;
        --left-date: 42px;
        --left-margin: 50px;
        --right-date: 42px;
        --right-margin: 50px;
      }

      html, body {
        overflow: auto;
        height: auto;
      }

      .book {
        height: auto;
        min-height: 100vh;
        box-shadow: none;
      }

      .spread {
        flex-direction: column;
        overflow: visible;
      }

      .page {
        overflow: visible;
        height: auto !important;
        padding: 0 12px 12px;
      }

      .spine { display: none; }
      .login-row { flex-direction: column; }
      .inp, .text-btn { width: 100%; }
      .save-guide { display: none; }
    }
  </style>
</head>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxlIatoeDhs1h7VgeX3tXfAj_vKGjYJEiPmR7T49LApzhhOTsElvuyJGaqY5EW638Dj/exec';
const PAGE_ID = new URLSearchParams(location.search).get('id') || 'default';
const TOK_KEY = 'clonote_token_' + PAGE_ID;
const USER_KEY = 'clonote_user_' + PAGE_ID;
const CACHE_PFX = 'clonote_c7_' + PAGE_ID;
const MAX_H = 10;
const DEF_H = 5;

let curDate = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let curUser = null;
let curToken = localStorage.getItem(TOK_KEY) || '';

let habits = [];
let habitDrafts = {};
let checks = {};
let checkDrafts = {};
let memos = {};
let memoDrafts = {};

let leftTab = 'memo-month';
let rightTab = 'habit-home';
let weekOff = 0;
let loadSeq = 0;
let isSyncing = false;
let autoSyncTimer = null;
let refreshJobs = {};

const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
const yr = () => curDate.getFullYear();
const mo = () => curDate.getMonth() + 1;
const ym = () => yr() + '-' + String(mo()).padStart(2, '0');
const last = () => new Date(yr(), mo(), 0).getDate();
const dow = d => new Date(yr(), mo() - 1, d).getDay();
const dcls = d => dow(d) === 6 ? 'sat' : dow(d) === 0 ? 'sun' : '';
const hcnt = () => Math.max(habits.filter(h => String(h || '').trim() !== '').length, DEF_H);
const memoDraftKey = (d, targetYm = ym()) => `${targetYm}:${d}`;
const habitDraftKey = (i, targetYm = ym()) => `${targetYm}:${i}`;
const checkDraftKey = (d, targetYm = ym()) => `${targetYm}:${d}`;

function setStatus(m, e = false) {
  $('statusText').textContent = m || '';
  $('statusText').style.color = e ? '#c0392b' : '#888';
}

function setLS(m, e = false) {
  $('loginStatus').textContent = m || '';
  $('loginStatus').style.color = e ? '#c0392b' : '#666';
}

function stGet(k) { try { return localStorage.getItem(k); } catch { return null; } }
function stSet(k, v) { try { localStorage.setItem(k, v); } catch {} }
function stDel(k) { try { localStorage.removeItem(k); } catch {} }
function stKeys() { try { return Object.keys(localStorage); } catch { return []; } }

function clearCachePrefix(prefix) {
  stKeys().forEach(k => { if (k.startsWith(prefix)) stDel(k); });
}

function clearLegacyCache() {
  clearCachePrefix(`clonote_c3_${PAGE_ID}:`);
  clearCachePrefix(`clonote_c4_${PAGE_ID}:`);
  clearCachePrefix(`clonote_c5_${PAGE_ID}:`);
  clearCachePrefix(`clonote_c6_${PAGE_ID}:`);
}

function cacheKey(type, targetYm = ym(), userId = curUser?.userId) {
  return `${CACHE_PFX}:${userId}:${targetYm}:${type}`;
}

function clearUserCache(userId = curUser?.userId) {
  if (userId) clearCachePrefix(`${CACHE_PFX}:${userId}:`);
}

function clearMonthCache(userId = curUser?.userId, targetYm = ym()) {
  if (!userId) return;
  ['h', 'hd', 'c', 'cd', 'm', 'md'].forEach(t => stDel(cacheKey(t, targetYm, userId)));
}

function scopedDrafts(store, targetYm) {
  const prefix = `${targetYm}:`;
  const out = {};
  Object.entries(store).forEach(([k, v]) => {
    if (k.startsWith(prefix)) out[k] = v;
  });
  return out;
}

function saveCache(targetYm = ym()) {
  if (!curUser) return;
  stSet(cacheKey('h', targetYm), JSON.stringify(habits));
  stSet(cacheKey('hd', targetYm), JSON.stringify(scopedDrafts(habitDrafts, targetYm)));
  stSet(cacheKey('c', targetYm), JSON.stringify(checks));
  stSet(cacheKey('cd', targetYm), JSON.stringify(scopedDrafts(checkDrafts, targetYm)));
  stSet(cacheKey('m', targetYm), JSON.stringify(memos));
  stSet(cacheKey('md', targetYm), JSON.stringify(scopedDrafts(memoDrafts, targetYm)));
}

function loadCache(targetYm = ym()) {
  if (!curUser) return {};
  try {
    return {
      h: JSON.parse(stGet(cacheKey('h', targetYm)) || 'null'),
      hd: JSON.parse(stGet(cacheKey('hd', targetYm)) || 'null'),
      c: JSON.parse(stGet(cacheKey('c', targetYm)) || 'null'),
      cd: JSON.parse(stGet(cacheKey('cd', targetYm)) || 'null'),
      m: JSON.parse(stGet(cacheKey('m', targetYm)) || 'null'),
      md: JSON.parse(stGet(cacheKey('md', targetYm)) || 'null')
    };
  } catch {
    return {};
  }
}

function hasMonthCache(targetYm = ym()) {
  return !!(curUser && (stGet(cacheKey('h', targetYm)) || stGet(cacheKey('c', targetYm)) || stGet(cacheKey('m', targetYm))));
}

function applyCachedState(cc) {
  if (Array.isArray(cc.h)) habits = cc.h;
  if (cc.hd && typeof cc.hd === 'object') {
    Object.entries(cc.hd).forEach(([k, v]) => { habitDrafts[k] = v; });
  }

  if (cc.c && typeof cc.c === 'object') {
    checks = {};
    Object.entries(cc.c).forEach(([d, v]) => {
      checks[+d] = Array.isArray(v) ? v : Array(MAX_H).fill(false);
    });
  }
  if (cc.cd && typeof cc.cd === 'object') {
    Object.entries(cc.cd).forEach(([k, v]) => { checkDrafts[k] = v; });
  }

  if (cc.m && typeof cc.m === 'object') {
    memos = {};
    Object.entries(cc.m).forEach(([d, v]) => {
      memos[+d] = String(v ?? '');
    });
  }
  if (cc.md && typeof cc.md === 'object') {
    Object.entries(cc.md).forEach(([k, v]) => { memoDrafts[k] = v; });
  }
}

function resetDisplayedState() {
  habits = [];
  checks = {};
  memos = {};
}

function clearAllDrafts() {
  habitDrafts = {};
  checkDrafts = {};
  memoDrafts = {};
}

function dayHasPending(kind, index, targetYm = ym()) {
  const key = kind === 'memo'
    ? memoDraftKey(index, targetYm)
    : kind === 'habit'
      ? habitDraftKey(index, targetYm)
      : checkDraftKey(index, targetYm);
  const store = kind === 'memo' ? memoDrafts : kind === 'habit' ? habitDrafts : checkDrafts;
  return Object.prototype.hasOwnProperty.call(store, key);
}

function dayStateClass(kind, index, targetYm = ym()) {
  return dayHasPending(kind, index, targetYm) ? 'pending' : '';
}

function markSaved(kind, index, src) {
  let selector = '';
  if (kind === 'memo') selector = `[id^="memo-day-"][id$="-${src}-${index}"]`;
  if (kind === 'habit') selector = `#habit-day-${index}`;
  if (kind === 'check') selector = `[id^="check-day-"][id$="-${src}-${index}"]`;

  document.querySelectorAll(selector).forEach(el => {
    el.classList.remove('pending');
    el.classList.add('saved');
  });

  setTimeout(() => {
    document.querySelectorAll(selector).forEach(el => el.classList.remove('saved'));
  }, 900);
}

function markPending(kind, index, src) {
  let selector = '';
  if (kind === 'memo') selector = `[id^="memo-day-"][id$="-${src}-${index}"]`;
  if (kind === 'habit') selector = `#habit-day-${index}`;
  if (kind === 'check') selector = `[id^="check-day-"][id$="-${src}-${index}"]`;

  document.querySelectorAll(selector).forEach(el => {
    el.classList.remove('saved');
    el.classList.add('pending');
  });
}

async function reqJson(url, options) {
  const r = await fetch(url, options);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

const gj = url => reqJson(url, { cache: 'no-store' });
const pj = body => reqJson(API_URL, {
  method: 'POST',
  cache: 'no-store',
  headers: { 'Content-Type': 'text/plain;charset=utf-8' },
  body: JSON.stringify(body)
});

async function tryAutoLogin() {
  if (!curToken) {
    renderMeta();
    return false;
  }
  try {
    const r = await gj(`${API_URL}?action=autoLogin&token=${encodeURIComponent(curToken)}&_=${Date.now()}`);
    if (r.success && r.user) {
      curUser = r.user;

function mergeDraftChecks(targetYm, nextChecks) {

    const [draftYm, draftDay] = key.split(':');
    if (draftYm === targetYm && Array.isArray(value)) {
      nextChecks[Number(draftDay)] = value;
    }
  });
}

async function loadAll(options = {}) {
  const { force = false, silent = false, targetYm = ym() } = options;
  if (!curUser) return;

  const seq = ++loadSeq;
  const activeMonth = targetYm === ym();

  if (force) clearMonthCache(curUser.userId, targetYm);
  else if (activeMonth && hasMonthCache(targetYm)) {
    applyCachedState(loadCache(targetYm));
    renderAll();
  }

  if (!silent && !hasMonthCache(targetYm)) setStatus('?곗씠?곕? 遺덈윭?ㅻ뒗 以?..');

  try {
    const [y, m] = targetYm.split('-').map(Number);
    const [hR, cR, mR] = await Promise.all([
      gj(`${API_URL}?action=getHabits&userId=${encodeURIComponent(curUser.userId)}&yearMonth=${encodeURIComponent(targetYm)}&_=${Date.now()}`),
      gj(`${API_URL}?action=getChecks&userId=${encodeURIComponent(curUser.userId)}&yearMonth=${encodeURIComponent(targetYm)}&_=${Date.now()}`),
      gj(`${API_URL}?action=getRecords&userId=${encodeURIComponent(curUser.userId)}&year=${y}&month=${m}&_=${Date.now()}`)
    ]);

    if (activeMonth && (seq !== loadSeq || targetYm !== ym())) return;

    const nextHabits = hR?.success && Array.isArray(hR.habits)
      ? hR.habits.map(v => String(v ?? '').trim())
      : [];

    const nextChecks = {};
    if (cR?.success && Array.isArray(cR.checks)) {
      cR.checks.forEach(item => {
        const d = Number(item.day);
        if (d >= 1 && d <= 31) {
          nextChecks[d] = Array.isArray(item.checks) ? item.checks : Array(MAX_H).fill(false);
        }
      });
    }
    mergeDraftChecks(targetYm, nextChecks);

    const nextMemos = {};
    if (mR?.success && Array.isArray(mR.records)) {
      mR.records.forEach(item => {
        const d = Number(item.day);
        if (d >= 1 && d <= 31) nextMemos[d] = String(item.memo ?? '');
      });
    }

    if (activeMonth) {
      habits = nextHabits;
      checks = nextChecks;
      memos = nextMemos;
      saveCache(targetYm);
      renderAll();
    } else {
      const ph = habits;
      const pc = checks;
      const pm = memos;
      habits = nextHabits;
      checks = nextChecks;
      memos = nextMemos;
      saveCache(targetYm);
      habits = ph;
      checks = pc;
      memos = pm;
    }

    if (!silent) setStatus('');
  } catch (err) {
    if (activeMonth && seq !== loadSeq) return;
    if (!silent) setStatus('濡쒕뱶 ?ㅽ뙣: ' + (err.message || '?ㅽ듃?뚰겕 ?ㅻ쪟'), true);
  }
}

function queueBackgroundRefresh(targetYm, force = false) {
  if (!curUser || refreshJobs[targetYm]) return;
  refreshJobs[targetYm] = true;
  Promise.resolve().then(async () => {
    try {
      await loadAll({ targetYm, force, silent: true });
    } finally {
      delete refreshJobs[targetYm];
    }
  });
}

function renderGraph() {
  const cv = document.getElementById('graphCanvas');
  if (!cv) return;
  const ctx = cv.getContext('2d');
  const ld = last();
  const cnt = hcnt();
  const now = new Date();
  const isCur = yr() === now.getFullYear() && mo() === now.getMonth() + 1;
  const today = isCur ? now.getDate() : ld;
  const data = [];
  for (let d = 1; d <= ld; d++) {
    const c = effectiveChecks(d);
    data.push(c.slice(0, cnt).filter(Boolean).length);
  }
  const hasAny = data.some(v => v > 0);
  const dpr = window.devicePixelRatio || 1;
  const W = cv.parentElement.clientWidth || 300;
  const H = cv.parentElement.clientHeight || 100;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  cv.width = W * dpr;
  cv.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  const p = { t: 12, r: 12, b: 22, l: 50 };
  const gW = W - p.l - p.r;
  const gH = H - p.t - p.b;
  ctx.strokeStyle = 'rgba(132,184,196,.28)';
  ctx.lineWidth = .5;
  for (let v = 0; v <= cnt; v++) {
    const y = p.t + gH - (v / cnt) * gH;
    ctx.beginPath();
    ctx.moveTo(p.l, y);
    ctx.lineTo(p.l + gW, y);
    ctx.stroke();
  }
  if (!hasAny) return;
  const pts = [];
  for (let d = 1; d <= today; d++) {
    pts.push({
      x: p.l + ((d - 1) / (ld - 1 || 1)) * gW,
      y: p.t + gH - (data[d - 1] / cnt) * gH
    });
  }
  ctx.beginPath();
  ctx.moveTo(pts[0].x, p.t + gH);
  pts.forEach(pt => ctx.lineTo(pt.x, pt.y));
  ctx.lineTo(pts[pts.length - 1].x, p.t + gH);
  ctx.closePath();
  ctx.fillStyle = 'rgba(93,134,200,.09)';
  ctx.fill();
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(93,134,200,.82)';
  ctx.lineWidth = 1.8;
  pts.forEach((pt, i) => i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y));
  ctx.stroke();
}

function getWeekDays() {
  const today = new Date();
  const isCur = yr() === today.getFullYear() && mo() === today.getMonth() + 1;
  const base = isCur ? today.getDate() : last();
  const bd = new Date(yr(), mo() - 1, base);
  const dw = bd.getDay();
  const monday = new Date(bd);
  monday.setDate(bd.getDate() - (dw === 0 ? 6 : dw - 1) + weekOff * 7);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    if (d.getFullYear() === yr() && d.getMonth() + 1 === mo()) days.push(d.getDate());
  }
  return days;
}

    else resetDisplayedState();
    renderAll();
    queueBackgroundRefresh(targetYm, !hasMonthCache(targetYm));
  } else {
    resetDisplayedState();
    renderAll();
  }
}

});
document.querySelectorAll('[data-ltab]').forEach(b => b.addEventListener('click', () => {
  leftTab = b.dataset.ltab;
  document.querySelectorAll('[data-ltab]').forEach(x => x.classList.toggle('active', x === b));
  renderAll();
}));
document.querySelectorAll('[data-rtab]').forEach(b => b.addEventListener('click', () => {
  rightTab = b.dataset.rtab;
  document.querySelectorAll('[data-rtab]').forEach(x => x.classList.toggle('active', x === b));
  renderAll();
}));
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && curUser) queueBackgroundRefresh(ym(), false);
});
window.addEventListener('focus', () => {
  if (curUser) queueBackgroundRefresh(ym(), false);
});
window.addEventListener('resize', () => setTimeout(renderAll, 80));

async function init() {
  clearLegacyCache();
  renderMeta();
  renderAll();
  let cachedUser = null;
  try {
    cachedUser = JSON.parse(stGet(USER_KEY) || 'null');
  } catch {}

  if (curToken && cachedUser) {
    curUser = cachedUser;
    renderMeta();
    if (hasMonthCache(ym())) {
      applyCachedState(loadCache(ym()));
      renderAll();
    }
    const ok = await tryAutoLogin();
    if (!ok) {
      clearAuth();
      resetDisplayedState();
      clearAllDrafts();
      renderMeta();
      renderAll();
      setStatus('濡쒓렇?몄씠 留뚮즺?섏뿀?듬땲??', true);
      return;
    }
    if (!hasMonthCache(ym())) await loadAll({ force: true });
    else queueBackgroundRefresh(ym(), false);
    startAutoSync();
    return;
  }

  const ok = await tryAutoLogin();
  if (ok) {
    renderAll();
    await loadAll({ force: !hasMonthCache(ym()) });
    startAutoSync();
  }
}

init();
</script>
</body>
</html>
