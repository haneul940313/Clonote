<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Clonote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --paper:        #fbfbf8;
      --paper-r:      #f8f8f5;
      --line:         rgba(132,184,196,0.45);
      --red-line:     rgba(208,112,112,0.42);
      --spine-mid:    #e0dcd4;
      --spine-edge:   #ccc8c0;
      --text:         #2f2f2f;
      --muted:        #8a8a8a;
      --sat:          #5d86c8;
      --sun:          #d06f6f;
      --accent:       #5d86c8;
      --radius:       10px;
      --row-h:        26px;   /* JS 덮어씀 */
      --left-date:    52px;
      --left-margin:  60px;
      --right-date:   44px;
      --right-margin: 52px;
      --total-w:      26px;
      --topbar-h:     42px;
      --status-h:     18px;
      --spine-w:      18px;
      /* 모바일 세로 구분선 높이 */
      --hspine-h:     14px;
    }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ════════════════════════════
       공책 외곽
    ════════════════════════════ */
    .book-outer {
      display: flex; flex-direction: column;
      width: 100%; height: 100vh;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    }

    /* ════════════════════════════
       TOP BAR — 좌우 페이지 색상과 연속
    ════════════════════════════ */
    .book-topbar {
      flex-shrink: 0;
      height: var(--topbar-h);
      background: linear-gradient(to right,
        var(--paper) 0%,
        var(--paper) 50%,
        var(--paper-r) 50%,
        var(--paper-r) 100%
      );
      border-bottom: 1px solid rgba(132,184,196,0.22);
      display: flex; align-items: center; padding: 0 14px;
      position: relative; z-index: 10;
    }
    .book-nav { display: flex; align-items: center; gap: 2px; }
    .month-title { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; color: #3a3630; white-space: nowrap; min-width: 82px; text-align: center; }
    .topbar-divider { width: 1px; height: 16px; background: rgba(0,0,0,0.11); margin: 0 10px; flex-shrink: 0; }
    .user-block { display: flex; align-items: center; gap: 4px; }
    .user-name  { font-size: 13px; font-weight: 600; color: #3a3630; white-space: nowrap; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }

    .icon-btn, .text-btn, .menu-btn {
      border: none; background: transparent; cursor: pointer; padding: 0;
      color: #3a3630; transition: opacity 0.15s;
      touch-action: manipulation;
    }
    .icon-btn { font-size: 22px; font-weight: 700; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
    .text-btn  { height: 26px; padding: 0 10px; font-size: 11px; font-weight: 600; border-radius: 6px; background: rgba(255,255,255,0.55); border: 1px solid rgba(0,0,0,0.07); white-space: nowrap; }
    .menu-btn  { font-size: 18px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
    .icon-btn:active, .text-btn:active, .menu-btn:active { opacity: 0.45; }

    .menu-wrap { position: relative; }
    .menu-pop  { display: none; position: absolute; top: 30px; right: 0; min-width: 80px; background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.12); padding: 5px; z-index: 50; }
    .menu-pop.show { display: block; }
    .menu-item { width: 100%; height: 32px; border: none; background: transparent; border-radius: 7px; text-align: left; padding: 0 10px; font-size: 13px; cursor: pointer; touch-action: manipulation; }
    .menu-item:active { background: #f0f0f0; }

    /* 로그인 */
    .login-box { display: none; background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.07); border-radius: 10px; padding: 10px 12px; margin: 4px 10px; flex-shrink: 0; }
    .login-box.show { display: block; }
    .guide { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
    .login-row { display: flex; gap: 5px; align-items: center; }
    .inp { height: 30px; border: 1px solid rgba(0,0,0,0.09); border-radius: 7px; padding: 0 8px; font-size: 13px; outline: none; background: #fff; flex: 1; -webkit-appearance: none; }
    .inp:focus { border-color: rgba(93,134,200,0.5); }
    .status-bar { min-height: 14px; font-size: 11px; color: #666; margin: 3px 2px 0; }

    /* ════════════════════════════
       BOOK SPREAD
    ════════════════════════════ */
    .book-spread { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* 데스크탑: 좌우 나란히 */
    .page-left {
      flex: 1; min-width: 0; overflow: hidden;
      background: var(--paper);
      padding: 0 14px 0 14px;
      background-image:
        linear-gradient(to right,
          transparent 0, transparent calc(var(--left-margin) - 1px),
          var(--red-line) calc(var(--left-margin) - 1px), var(--red-line) calc(var(--left-margin) + 1px),
          transparent calc(var(--left-margin) + 1px)
        ),
        repeating-linear-gradient(to bottom,
          transparent 0, transparent calc(var(--row-h) - 1px),
          var(--line) calc(var(--row-h) - 1px), var(--line) var(--row-h)
        );
    }
    .spine-v {
      width: var(--spine-w); flex-shrink: 0; overflow: hidden;
      background: linear-gradient(to right, var(--spine-edge), var(--spine-mid), var(--spine-edge));
      position: relative;
      display: flex; flex-direction: column; align-items: center; padding-top: 6px; gap: 0;
    }
    .spine-v::before {
      content: ''; position: absolute; top: 0; bottom: 0; left: 2px; right: 2px;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 10px, rgba(0,0,0,0.06) 10px, rgba(0,0,0,0.06) 11px);
    }
    .ring { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #b0aca4; background: #e8e4dc; position: relative; z-index: 1; }

    .page-right {
      flex: 1; min-width: 0; overflow: hidden;
      background: var(--paper-r);
      padding: 0 14px 0 14px;
      background-image:
        linear-gradient(to right,
          transparent 0, transparent calc(var(--right-margin) - 1px),
          var(--red-line) calc(var(--right-margin) - 1px), var(--red-line) calc(var(--right-margin) + 1px),
          transparent calc(var(--right-margin) + 1px)
        ),
        repeating-linear-gradient(to bottom,
          transparent 0, transparent calc(var(--row-h) - 1px),
          var(--line) calc(var(--row-h) - 1px), var(--line) var(--row-h)
        );
    }

    /* ════════════════════════════
       모바일: 위아래 쌓기
    ════════════════════════════ */
    .spine-h {
      display: none;
      height: var(--hspine-h); flex-shrink: 0; overflow: hidden;
      background: linear-gradient(to bottom, var(--spine-edge), var(--spine-mid), var(--spine-edge));
      position: relative;
      flex-direction: row; align-items: center; justify-content: space-around; padding: 0 8px;
    }
    .spine-h::before {
      content: ''; position: absolute; top: 2px; bottom: 2px; left: 0; right: 0;
      background: repeating-linear-gradient(to right, transparent 0, transparent 10px, rgba(0,0,0,0.06) 10px, rgba(0,0,0,0.06) 11px);
    }
    .ring-h { flex-shrink: 0; width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid #b0aca4; background: #e8e4dc; position: relative; z-index: 1; }

    /* ════════════════════════════
       PAGE HEADER
    ════════════════════════════ */
    .page-header { display: flex; align-items: center; justify-content: space-between; height: var(--row-h); padding: 0 2px; }
    .page-title  { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .tab-pills   { display: flex; gap: 2px; }
    .tab-pill    { border: none; background: transparent; font-size: 10px; font-weight: 700; color: var(--muted); padding: 3px 7px; border-radius: 5px; cursor: pointer; transition: background 0.12s, color 0.12s; touch-action: manipulation; }
    .tab-pill.active { background: rgba(93,134,200,0.14); color: var(--accent); }

    /* ════════════════════════════
       ROWS
    ════════════════════════════ */
    .day-cell { height: var(--row-h); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #777; white-space: nowrap; flex-shrink: 0; margin-left: -2px; }
    .day-cell.sat { color: var(--sat); }
    .day-cell.sun { color: var(--sun); }

    .memo-row  { display: grid; grid-template-columns: var(--left-date) 1fr; height: var(--row-h); align-items: center; }
    .memo-cell { display: flex; align-items: center; height: var(--row-h); padding: 0 6px; position: relative; overflow: hidden; min-width: 0; }
    .memo-input {
      width: 100%; height: 100%; border: none; outline: none; background: transparent;
      padding: 0; font-size: 13px; color: var(--text); line-height: 1;
      overflow-x: auto; overflow-y: hidden; white-space: nowrap;
      -webkit-appearance: none;
    }
    .memo-input:disabled { color: rgba(0,0,0,0.35); cursor: default; }
    .save-ind { position: absolute; right: 2px; top: 50%; transform: translateY(-50%); font-size: 9px; color: #9a9a9a; opacity: 0; transition: opacity 0.15s; pointer-events: none; background: rgba(251,251,248,0.92); padding-left: 4px; }
    .save-ind.show { opacity: 1; }

    .habit-hdr { display: grid; align-items: center; height: var(--row-h); }
    .hdr-cell  { font-size: 9px; font-weight: 700; color: var(--muted); text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 1px; display: flex; align-items: center; justify-content: center; }
    .hdr-total { width: var(--total-w); font-size: 9px; font-weight: 700; color: var(--accent); text-align: center; display: flex; align-items: center; justify-content: center; }

    .check-row { display: grid; align-items: center; height: var(--row-h); }
    .cb-wrap   { display: flex; align-items: center; justify-content: center; }
    .cb-wrap input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; touch-action: manipulation; }
    .cb-wrap input[type="checkbox"]:disabled { opacity: 0.3; }
    .total-cell { width: var(--total-w); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent); height: var(--row-h); }

    .setup-row      { display: grid; grid-template-columns: var(--right-date) 1fr; height: var(--row-h); align-items: center; }
    .setup-num      { height: var(--row-h); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); }
    .setup-inp-wrap { display: flex; align-items: center; height: var(--row-h); padding: 0 6px; }
    .setup-inp { width: 100%; height: 100%; border: none; outline: none; background: transparent; font-size: 13px; color: var(--text); -webkit-appearance: none; }
    .setup-inp::placeholder { color: #c5c5c5; }
    .setup-inp:disabled { color: rgba(0,0,0,0.32); }

    .graph-wrap { overflow: hidden; }
    canvas.graph { display: block; width: 100%; }

    .week-nav { display: flex; align-items: center; justify-content: space-between; height: var(--row-h); padding-left: var(--right-date); }
    .week-lbl { font-size: 10px; font-weight: 700; color: var(--muted); }
    .w-arrow  { border: none; background: transparent; color: #999; font-size: 18px; font-weight: 700; cursor: pointer; padding: 0 4px; line-height: 1; touch-action: manipulation; }
    .w-arrow:active   { opacity: 0.5; }
    .w-arrow:disabled { opacity: 0.2; cursor: default; }

    .habit-save-row { height: var(--row-h); display: flex; align-items: center; padding-left: var(--right-date); }
    .habit-save-btn { border: none; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 14px; border-radius: 6px; cursor: pointer; touch-action: manipulation; }
    .habit-save-btn:active  { opacity: 0.75; }
    .habit-save-btn:disabled { opacity: 0.4; }

    /* ════════════════════════════
       STATUS BAR — 좌우 연속
    ════════════════════════════ */
    .book-status {
      flex-shrink: 0; height: var(--status-h);
      background: linear-gradient(to right,
        var(--paper) 0%,
        var(--paper) 50%,
        var(--paper-r) 50%,
        var(--paper-r) 100%
      );
      border-top: 1px solid rgba(132,184,196,0.22);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #888;
    }

    /* ════════════════════════════
       MOBILE  ≤ 640px
    ════════════════════════════ */
    @media (max-width: 640px) {
      :root {
        --topbar-h:     40px;
        --left-date:    40px;
        --left-margin:  48px;
        --right-date:   38px;
        --right-margin: 46px;
        --total-w:      24px;
        --spine-w:      14px;   /* 상하단 그라디언트 폭 */
      }

      /* 좌우 → 상하 */
      .book-spread { flex-direction: column; }

      /* 세로 제본선 숨김 */
      .spine-v { display: none !important; }

      /* 가로 제본선 표시 */
      .spine-h { display: flex; }

      /* 양쪽 페이지 동일 padding */
      .page-left, .page-right { padding: 0 12px 0 12px; flex: none; }

      /* 높이는 JS가 각각 style.height 로 설정 */

      /* 상태바: 모바일에서는 단색 */
      .book-status { background: var(--paper-r); }

      /* 탭 글자 키우기 */
      .tab-pill { font-size: 11px; padding: 4px 8px; }

      /* 체크박스 더 크게 */
      .cb-wrap input[type="checkbox"] { width: 17px; height: 17px; }
    }
  </style>
</head>
<body>

<div class="book-outer">

  <!-- TOP BAR -->
  <div class="book-topbar">
    <div class="book-nav">
      <button class="icon-btn" id="prevBtn">‹</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="icon-btn" id="nextBtn">›</button>
    </div>
    <div class="topbar-divider"></div>
    <div class="user-block">
      <div class="user-name" id="userNameText">사용자</div>
      <div class="menu-wrap" id="menuWrap" style="display:none;">
        <button class="menu-btn" id="menuBtn">⋯</button>
        <div class="menu-pop" id="menuPop">
          <button class="menu-item" id="logoutBtn">로그아웃</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <div class="guide">최초 1회만 입력하면 자동 로그인됩니다.</div>
    <div class="login-row">
      <input class="inp" id="loginName" type="text" placeholder="사용자 이름" maxlength="30" autocomplete="username" />
      <input class="inp" id="loginPass" type="password" placeholder="비밀번호" maxlength="30" autocomplete="current-password" />
      <button class="text-btn" id="startBtn">시작</button>
    </div>
    <div class="status-bar" id="loginStatus"></div>
  </div>

  <!-- BOOK SPREAD -->
  <div class="book-spread" id="bookSpread">

    <!-- 왼쪽(위) — 메모 -->
    <div class="page-left" id="pageLeft">
      <div class="page-header">
        <div class="page-title">메모</div>
        <div class="tab-pills">
          <button class="tab-pill active" data-ltab="memo-month">월간</button>
          <button class="tab-pill"        data-ltab="memo-week">주간</button>
        </div>
      </div>
      <div id="memoContent"></div>
    </div>

    <!-- 데스크탑 세로 제본선 -->
    <div class="spine-v" id="spineV"></div>

    <!-- 모바일 가로 제본선 -->
    <div class="spine-h" id="spineH"></div>

    <!-- 오른쪽(아래) — 습관 -->
    <div class="page-right" id="pageRight">
      <div class="page-header">
        <div class="page-title">습관</div>
        <div class="tab-pills">
          <button class="tab-pill active" data-rtab="habit-home">홈</button>
          <button class="tab-pill"        data-rtab="habit-setup">설정</button>
          <button class="tab-pill"        data-rtab="habit-all">전체</button>
        </div>
      </div>
      <div id="habitContent"></div>
    </div>
  </div>

  <div class="book-status" id="statusText"></div>
</div>

<script>
const API_URL   = 'https://script.google.com/macros/s/AKfycbx7c5hpzouh_OxnSRkXWPi23w7h_QMNvG6we93HoEOfBrCSeb-CnHUgXlWHQENQS2rV/exec';
const TOK_KEY   = 'clonote_token';
const USER_KEY  = 'clonote_user';
const CACHE_PFX = 'clonote_c2';

/* localStorage 래퍼 — try/catch로 보호 */
function stGet(k){ try{ return localStorage.getItem(k); }catch{ return null; } }
function stSet(k,v){ try{ localStorage.setItem(k,v); }catch{} }
function stDel(k){ try{ localStorage.removeItem(k); }catch{} }
const MAX_H     = 10;
const DEF_H     = 5;
const DEBOUNCE  = 650;

let curDate     = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let curUser     = null;
let curToken    = stGet(TOK_KEY)||'';
let habits      = [];
let checks      = {};
let memos       = {};
let leftTab     = 'memo-month';
let rightTab    = 'habit-home';
let weekOff     = 0;
let isMobile    = false;
let memoTimers  = {};
let memoVers    = {};
let checkTimers = {};

const $    = id => document.getElementById(id);
const esc  = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const yr   = () => curDate.getFullYear();
const mo   = () => curDate.getMonth()+1;
const ym   = () => yr()+'-'+String(mo()).padStart(2,'0');
const last = () => new Date(yr(), mo(), 0).getDate();
const dow  = d  => new Date(yr(), mo()-1, d).getDay();
const dcls = d  => { const w=dow(d); return w===6?'sat':w===0?'sun':''; };
const hcnt = () => Math.max(habits.filter(h=>h.trim()!=='').length, DEF_H);

function setStatus(m,e=false){ $('statusText').textContent=m||''; $('statusText').style.color=e?'#c0392b':'#888'; }
function setLS(m,e=false){ $('loginStatus').textContent=m||''; $('loginStatus').style.color=e?'#c0392b':'#666'; }

/* ─────────────────────────────────────
   레이아웃 / 행 높이 계산
───────────────────────────────────────
   데스크탑: 좌우 나란히, 양쪽 같은 행 높이
   모바일:   위(메모) + 아래(습관) 수직 스택,
             각각 독립적인 행 높이 계산
───────────────────────────────────────*/
function getCSSVar(name) {
  return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name));
}

function calcLayout() {
  isMobile = window.innerWidth <= 640;
  // 행 높이는 CSS 고정값 26px — 날짜/탭에 따라 변하지 않음
  $('pageLeft').style.height  = '';
  $('pageRight').style.height = '';
  const rowH = 26;
  return { rowH, graphRows: 6 };
}

/* ─── CACHE ─── */
function ck(t){ return `${CACHE_PFX}:${curUser?.userId}:${ym()}:${t}`; }
function saveCache(){
  if(!curUser) return;
  try { stSet(ck('h'),JSON.stringify(habits)); stSet(ck('c'),JSON.stringify(checks)); stSet(ck('m'),JSON.stringify(memos)); } catch{}
}
function loadCache(){
  try {
    const h=stGet(ck('h')), c=stGet(ck('c')), m=stGet(ck('m'));
    return { h:h?JSON.parse(h):null, c:c?JSON.parse(c):null, m:m?JSON.parse(m):null };
  } catch{ return {}; }
}

/* ─── API ─── */
const gj = url  => fetch(url).then(r=>r.json());
const pj = body => fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)}).then(r=>r.json());

/* ─── AUTH ─── */
async function tryAutoLogin(){
  if(!curToken){ renderMeta(); return false; }
  try {
    const r = await gj(`${API_URL}?action=autoLogin&token=${encodeURIComponent(curToken)}`);
    if(r.success&&r.user){ curUser=r.user; stSet(USER_KEY,JSON.stringify(curUser)); renderMeta(); return true; }
    clearAuth(); return false;
  } catch{ renderMeta(); return false; }
}
function clearAuth(){ stDel(TOK_KEY); stDel(USER_KEY); curToken=''; curUser=null; }

async function doStart(){
  const n=$('loginName').value.trim(), p=$('loginPass').value.trim();
  if(!n||!p){ setLS('이름과 비밀번호를 입력해 주세요.',true); return; }
  $('startBtn').disabled=true; setLS('확인 중...');
  try {
    await pj({action:'registerUser',userName:n,password:p});
    const r=await pj({action:'login',userName:n,password:p});
    if(!r.success||!r.token||!r.user) throw new Error(r.message||'로그인 실패');
    curToken=r.token; curUser=r.user;
    stSet(TOK_KEY,curToken); stSet(USER_KEY,JSON.stringify(curUser));
    $('loginName').value=''; $('loginPass').value=''; setLS('');
    renderMeta(); await loadAll();
  } catch(e){ setLS(e.message||'실패',true); }
  finally{ $('startBtn').disabled=false; }
}
async function doLogout(){
  try{ if(curToken) await pj({action:'logout',token:curToken}); } catch{}
  clearAuth(); habits=[]; checks={}; memos={};
  renderMeta(); renderAll(); setStatus('로그아웃되었습니다.');
}

function renderMeta(){
  $('monthTitle').textContent = yr()+'년 '+mo()+'월';
  $('userNameText').textContent = curUser?.userName||'사용자';
  $('loginBox').classList.toggle('show',!curUser);
  $('menuWrap').style.display = curUser ? 'block' : 'none';
  if(!curUser) $('menuPop').classList.remove('show');
}

/* ─── LOAD ─── */
async function loadAll(){
  console.log('[Clonote] loadAll called, curUser:', curUser?.userId, 'ym:', ym());
  renderMeta(); if(!curUser) return;
  const cc=loadCache();
  if(cc.h) habits=cc.h;
  if(cc.c){ checks={}; Object.entries(cc.c).forEach(([d,v])=>{ checks[+d]=v; }); }
  if(cc.m){ memos={};  Object.entries(cc.m).forEach(([d,v])=>{ memos[+d]=v; }); }
  renderAll();
  try {
    const habitUrl = `${API_URL}?action=getHabits&userId=${curUser.userId}&yearMonth=${ym()}`;
    const [hR,cR,mR] = await Promise.all([
      gj(habitUrl),
      gj(`${API_URL}?action=getChecks&userId=${curUser.userId}&yearMonth=${ym()}`),
      gj(`${API_URL}?action=getRecords&userId=${curUser.userId}&year=${yr()}&month=${mo()}`)
    ]);

    // 디버그: 습관 응답 확인
    console.log('[Clonote] getHabits response:', JSON.stringify(hR));
    console.log('[Clonote] userId:', curUser.userId, 'yearMonth:', ym());

    if(hR.success && Array.isArray(hR.habits)) {
      habits = hR.habits;
    } else if(!hR.success) {
      setStatus('습관 로드 실패: ' + (hR.message||'unknown'), true);
    }
    // hR.habits === null 이면 기존값 유지 (캐시)

    checks={}; if(cR.success&&cR.checks) cR.checks.forEach(c=>{ checks[c.day]=c.checks; });
    memos={};  if(mR.success&&mR.records) mR.records.forEach(r=>{ memos[r.day]=r.memo||''; });
    saveCache();
  } catch(err){ console.error('[Clonote] loadAll error:', err); setStatus('네트워크 오류: '+(err.message||err), true); return; }
  renderAll(); setStatus('');
}

/* ─── RENDER ALL ─── */
function renderAll(){
  const { rowH, graphRows } = calcLayout();
  renderLeft();
  renderRight(rowH, graphRows);
  buildSpines(rowH);
}

/* ══════ LEFT ══════ */
function renderLeft(){
  const el=$('memoContent');
  el.innerHTML = (leftTab==='memo-month') ? buildMemoRows(1,last(),'lm') : buildMemoWeek();
  bindMemo(el);
}
function buildMemoRows(from,to,src){
  let h='';
  for(let d=from;d<=to;d++){
    h+=`<div class="memo-row">
      <div class="day-cell ${dcls(d)}" style="width:var(--left-date);">${d}일</div>
      <div class="memo-cell">
        <input class="memo-input" id="mi-${src}-${d}" type="text" data-day="${d}" data-src="${src}"
          value="${esc(memos[d]||'')}" ${curUser?'':'disabled'} autocomplete="off"/>
        <span class="save-ind" id="si-${src}-${d}"></span>
      </div>
    </div>`;
  }
  return h;
}
function buildMemoWeek(){
  const days=getWeekDays();
  if(!days.length) return '<div style="padding:8px 4px;font-size:11px;color:var(--muted);">해당 없음</div>';
  return buildMemoRows(days[0],days[days.length-1],'lw');
}
function bindMemo(el){
  el.querySelectorAll('.memo-input').forEach(inp=>{
    inp.addEventListener('input',()=>scheduleMemo(+inp.dataset.day,inp.dataset.src));
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault(); flushMemo(+inp.dataset.day,inp.dataset.src);} });
    inp.addEventListener('blur',()=>flushMemo(+inp.dataset.day,inp.dataset.src));
  });
}

/* ══════ RIGHT ══════ */
function renderRight(rowH, graphRows){
  const el=$('habitContent');
  if(rightTab==='habit-home')       el.innerHTML=buildHabitHome(rowH,graphRows);
  else if(rightTab==='habit-setup') el.innerHTML=buildHabitSetup();
  else                              el.innerHTML=buildHabitAll();
  bindChecks(el);
  if(rightTab==='habit-setup') bindSetup(el);
  if(rightTab==='habit-home')  renderGraph();
}

function buildHabitHome(rowH, graphRows){
  const days=getWeekDays(), lastDay=last();
  const minD=days[0]||1, maxD=days[days.length-1]||lastDay;
  const lbl=days.length?`${days[0]}일 — ${days[days.length-1]}일`:'';
  // 그래프: 행 6개 높이
  const graphH = rowH * graphRows;
  let h=`<div class="graph-wrap" style="height:${graphH}px;"><canvas class="graph" id="graphCanvas"></canvas></div>`;
  h+=`<div class="week-nav">
    <button class="w-arrow" id="wPrev" ${minD<=1?'disabled':''}>‹</button>
    <div class="week-lbl">${lbl}</div>
    <button class="w-arrow" id="wNext" ${maxD>=lastDay?'disabled':''}>›</button>
  </div>`;
  if(days.length){ h+=buildCheckHeader('rh'); days.forEach(d=>{ h+=buildCheckRow(d,'rh'); }); }
  return h;
}
function buildHabitAll(){
  let h=buildCheckHeader('ra');
  for(let d=1;d<=last();d++) h+=buildCheckRow(d,'ra');
  return h;
}
function buildCheckHeader(src){
  const cnt=hcnt(), col=`var(--right-date) repeat(${cnt},1fr) var(--total-w)`;
  let cells=''; habits.slice(0,cnt).forEach(n=>{ cells+=`<div class="hdr-cell">${esc(n||'—')}</div>`; });
  return `<div class="habit-hdr" style="grid-template-columns:${col};">
    <div style="width:var(--right-date);flex-shrink:0;"></div>${cells}
    <div class="hdr-total">합</div>
  </div>`;
}
function buildCheckRow(d,src){
  const cnt=hcnt(), col=`var(--right-date) repeat(${cnt},1fr) var(--total-w)`;
  const ch=checks[d]||Array(MAX_H).fill(false), tot=ch.slice(0,cnt).filter(Boolean).length;
  const dis=curUser?'':'disabled';

  let cbs='';
  for(let i=0;i<cnt;i++) cbs+=`<div class="cb-wrap"><input type="checkbox" data-day="${d}" data-idx="${i}" data-src="${src}" ${ch[i]?'checked':''} ${dis}/></div>`;
  return `<div class="check-row" style="grid-template-columns:${col};">
    <div class="day-cell ${dcls(d)}" style="width:var(--right-date);flex-shrink:0;">${d}일</div>
    ${cbs}
    <div class="total-cell" id="tc-${src}-${d}">${tot>0?tot:''}</div>
  </div>`;
}
function buildHabitSetup(){
  let h='';
  for(let i=0;i<MAX_H;i++){
    const dis=curUser?'':'disabled', ph=i<DEF_H?`습관 ${i+1}`:`습관 ${i+1} (선택)`;
    h+=`<div class="setup-row"><div class="setup-num">${i+1}</div><div class="setup-inp-wrap">
      <input class="setup-inp" type="text" data-hi="${i}" value="${esc(habits[i]||'')}" placeholder="${ph}" maxlength="20" ${dis} autocomplete="off"/>
    </div></div>`;
  }
  return h+`<div class="habit-save-row"><button class="habit-save-btn" id="habitSaveBtn">저장</button></div>`;
}
function bindSetup(el){ const b=el.querySelector('#habitSaveBtn'); if(b) b.addEventListener('click',doSaveHabits); }
async function doSaveHabits(){
  if(!curUser) return;
  const h=Array.from(document.querySelectorAll('.setup-inp')).map(i=>i.value.trim());
  const btn=document.getElementById('habitSaveBtn');
  if(btn) btn.disabled=true; setStatus('저장 중...');
  try {
    const r=await pj({action:'saveHabits',userId:curUser.userId,yearMonth:ym(),habits:h});
    if(!r.success) throw new Error(r.message);
    habits=r.habits; saveCache();
    rightTab='habit-home';
    document.querySelectorAll('[data-rtab]').forEach(x=>x.classList.toggle('active',x.dataset.rtab==='habit-home'));
    renderAll(); setStatus('습관이 저장되었습니다.'); setTimeout(()=>setStatus(''),2000);
  } catch(e){ setStatus(e.message||'저장 실패',true); if(btn) btn.disabled=false; }
}

function bindChecks(el){
  el.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.addEventListener('change',onCheck));
  const wp=el.querySelector('#wPrev'), wn=el.querySelector('#wNext');
  if(wp) wp.addEventListener('click',()=>{ weekOff--; renderAll(); });
  if(wn) wn.addEventListener('click',()=>{ weekOff++; renderAll(); });
}
function onCheck(e){
  if(!curUser) return;
  const d=+e.target.dataset.day, idx=+e.target.dataset.idx, cnt=hcnt();
  const prev=checks[d]?[...checks[d]]:Array(MAX_H).fill(false);
  prev[idx]=e.target.checked; checks[d]=prev;
  const tot=prev.slice(0,cnt).filter(Boolean).length;
  document.querySelectorAll(`input[type="checkbox"][data-day="${d}"][data-idx="${idx}"]`).forEach(cb=>{ if(cb!==e.target) cb.checked=e.target.checked; });
  document.querySelectorAll(`[id^="tc-"][id$="-${d}"]`).forEach(el=>{ el.textContent=tot>0?tot:''; });
  saveCache(); if(rightTab==='habit-home') renderGraph();
  clearTimeout(checkTimers[d]);
  checkTimers[d]=setTimeout(async()=>{
    try { const r=await pj({action:'saveCheck',userId:curUser.userId,yearMonth:ym(),day:d,checks:checks[d]}); if(!r.success) setStatus('체크 저장 실패',true); }
    catch{ setStatus('체크 저장 오류',true); }
  },800);
}

/* ══════ MEMO SAVE ══════ */
function scheduleMemo(d,src){ if(!curUser) return; clearTimeout(memoTimers[d]); showInd(d,src,'저장중',true); memoTimers[d]=setTimeout(()=>flushMemo(d,src),DEBOUNCE); }
function flushMemo(d,src){ if(!curUser) return; clearTimeout(memoTimers[d]); doMemoSave(d,src); }
async function doMemoSave(d,src){
  const inp=document.getElementById(`mi-${src}-${d}`); if(!inp) return;
  const val=inp.value.trim();
  const other=src==='lm'?'lw':'lm';
  const twin=document.getElementById(`mi-${other}-${d}`); if(twin&&twin.value!==inp.value) twin.value=inp.value;
  if(!val){ showInd(d,src,'',false); showInd(d,other,'',false); memos[d]=''; saveCache(); return; }
  if(val===(memos[d]||'')){ showInd(d,src,'',false); return; }
  const ver=(memoVers[d]||0)+1; memoVers[d]=ver;
  try {
    const r=await pj({action:'saveRecord',userId:curUser.userId,year:yr(),month:mo(),day:d,memo:val});
    if(memoVers[d]!==ver) return;
    if(!r.success) throw new Error(r.message);
    memos[d]=val; saveCache(); showInd(d,src,'',false); showInd(d,other,'',false);
    setStatus(`${d}일 메모 저장`); setTimeout(()=>setStatus(''),1500);
  } catch(err){ if(memoVers[d]!==ver) return; showInd(d,src,'오류',true); setStatus(err.message||'메모 저장 오류',true); }
}
function showInd(d,src,txt,show){ const el=document.getElementById(`si-${src}-${d}`); if(!el) return; el.textContent=txt; el.classList.toggle('show',show&&!!txt); }

/* ══════ GRAPH ══════ */
function renderGraph(){
  const cv=document.getElementById('graphCanvas'); if(!cv) return;
  const ctx=cv.getContext('2d');
  const ld=last(), cnt=hcnt();
  const now=new Date();
  const isCur=(yr()===now.getFullYear()&&mo()===now.getMonth()+1);
  const today=isCur?now.getDate():ld;
  const data=[]; for(let d=1;d<=ld;d++){ const c=checks[d]||[]; data.push(c.slice(0,cnt).filter(Boolean).length); }
  const hasAny=data.some(v=>v>0);
  const dpr=window.devicePixelRatio||1;
  const W=cv.parentElement.clientWidth||300;
  const H=cv.parentElement.clientHeight||100;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cv.width=W*dpr; cv.height=H*dpr;
  ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  // p.l: 날짜 셀(--right-date) + 여백
  const rdVal = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--right-date'))||44;
  const p={t:12,r:12,b:22,l: rdVal + 6};
  const gW=W-p.l-p.r, gH=H-p.t-p.b;
  // 격자
  ctx.strokeStyle='rgba(132,184,196,0.28)'; ctx.lineWidth=0.5;
  for(let v=0;v<=cnt;v++){
    const y=p.t+gH-(v/cnt)*gH;
    ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(p.l+gW,y); ctx.stroke();
    if(v>0){ ctx.fillStyle='rgba(100,100,100,0.38)'; ctx.font=`${Math.min(9,H/10)}px Arial`; ctx.textAlign='center'; ctx.fillText(v, rdVal/2, y+3); }
  }
  // X 레이블
  ctx.fillStyle='rgba(100,100,100,0.42)'; ctx.font=`${Math.min(9,H/10)}px Arial`; ctx.textAlign='center';
  for(let d=1;d<=ld;d++){ if(d===1||d%5===0||d===ld){ const x=p.l+((d-1)/(ld-1||1))*gW; ctx.fillText(d,x,H-p.b+11); } }
  if(!hasAny) return;
  const pts=[]; for(let d=1;d<=today;d++) pts.push({x:p.l+((d-1)/(ld-1||1))*gW, y:p.t+gH-(data[d-1]/cnt)*gH, v:data[d-1]});
  if(!pts.length) return;
  // 면
  ctx.beginPath(); ctx.moveTo(pts[0].x,p.t+gH); pts.forEach(pt=>ctx.lineTo(pt.x,pt.y)); ctx.lineTo(pts[pts.length-1].x,p.t+gH); ctx.closePath(); ctx.fillStyle='rgba(93,134,200,0.09)'; ctx.fill();
  // 선
  ctx.beginPath(); ctx.strokeStyle='rgba(93,134,200,0.82)'; ctx.lineWidth=1.8; ctx.lineJoin='round'; pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y)); ctx.stroke();
  // 점
  pts.forEach(pt=>{ ctx.beginPath(); ctx.arc(pt.x,pt.y,2.2,0,Math.PI*2); ctx.fillStyle=pt.v>0?'rgba(93,134,200,0.85)':'rgba(190,190,190,0.5)'; ctx.fill(); });
}

/* ══════ WEEK DAYS ══════ */
function getWeekDays(){
  const today=new Date(), isCur=(yr()===today.getFullYear()&&mo()===today.getMonth()+1);
  const base=isCur?today.getDate():last();
  const bd=new Date(yr(),mo()-1,base), dw=bd.getDay();
  const monday=new Date(bd); monday.setDate(bd.getDate()-(dw===0?6:dw-1)+weekOff*7);
  const days=[];
  for(let i=0;i<7;i++){ const d=new Date(monday); d.setDate(monday.getDate()+i); if(d.getFullYear()===yr()&&d.getMonth()+1===mo()) days.push(d.getDate()); }
  return days;
}

/* ══════ SPINE ══════ */
function buildSpines(rowH){
  // 세로 제본선 (데스크탑)
  const sv=$('spineV');
  if(sv && sv.offsetHeight>0){
    const h=sv.offsetHeight, gap=Math.max(3,rowH-10);
    const count=Math.max(4,Math.floor(h/(10+gap)));
    sv.innerHTML=Array.from({length:count},()=>`<div class="ring" style="margin-bottom:${gap}px;"></div>`).join('');
  }
  // 가로 제본선 (모바일)
  const sh=$('spineH');
  if(sh && sh.offsetWidth>0){
    const w=sh.offsetWidth;
    const count=Math.max(8,Math.floor(w/30));
    sh.innerHTML=Array.from({length:count},()=>`<div class="ring-h"></div>`).join('');
  }
}

/* ══════ MONTH NAV ══════ */
function moveMonth(off){ curDate=new Date(yr(),mo()-1+off,1); weekOff=0; habits=[]; checks={}; memos={}; renderAll(); loadAll(); }

/* ══════ EVENTS ══════ */
$('prevBtn').addEventListener('click',()=>moveMonth(-1));
$('nextBtn').addEventListener('click',()=>moveMonth(1));
$('startBtn').addEventListener('click',doStart);
$('logoutBtn').addEventListener('click',doLogout);
$('loginName').addEventListener('keydown',e=>{ if(e.key==='Enter') $('loginPass').focus(); });
$('loginPass').addEventListener('keydown',e=>{ if(e.key==='Enter') doStart(); });
$('menuBtn').addEventListener('click',e=>{ e.stopPropagation(); $('menuPop').classList.toggle('show'); });
document.addEventListener('click',e=>{ if(!$('menuWrap').contains(e.target)) $('menuPop').classList.remove('show'); });

document.querySelectorAll('[data-ltab]').forEach(b=>b.addEventListener('click',()=>{
  leftTab=b.dataset.ltab;
  document.querySelectorAll('[data-ltab]').forEach(x=>x.classList.toggle('active',x===b));
  renderAll();
}));
document.querySelectorAll('[data-rtab]').forEach(b=>b.addEventListener('click',()=>{
  rightTab=b.dataset.rtab;
  document.querySelectorAll('[data-rtab]').forEach(x=>x.classList.toggle('active',x===b));
  renderAll();
}));

let resizeTimer;
window.addEventListener('resize',()=>{ clearTimeout(resizeTimer); resizeTimer=setTimeout(renderAll,80); });

// 모바일 키보드 올라올 때 재계산
window.addEventListener('focusin', ()=>{ if(isMobile) setTimeout(renderAll,300); });
window.addEventListener('focusout',()=>{ if(isMobile) setTimeout(renderAll,300); });

/* ══════ INIT ══════ */
async function init(){
  renderMeta(); renderAll();
  const cachedUser=(()=>{ try{ const r=stGet(USER_KEY); return r?JSON.parse(r):null; }catch{return null;} })();
  if(curToken && cachedUser){
    // 캐시 유저로 즉시 표시
    curUser = cachedUser; renderMeta();
    // 캐시 데이터 먼저 표시
    const cc = loadCache();
    if(cc.h) habits = cc.h;
    if(cc.c){ checks={}; Object.entries(cc.c).forEach(([d,v])=>{ checks[+d]=v; }); }
    if(cc.m){ memos={};  Object.entries(cc.m).forEach(([d,v])=>{ memos[+d]=v; }); }
    renderAll();
    // 토큰 검증 + 서버 데이터 로드 (한 번만)
    const ok = await tryAutoLogin();
    if(!ok){ clearAuth(); renderMeta(); renderAll(); setStatus('로그인이 만료되었습니다.',true); return; }
    await loadAll();
    return;
  }
  const ok = await tryAutoLogin();
  if(ok) await loadAll();
}
init();
</script>
