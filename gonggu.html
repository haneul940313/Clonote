<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>공동구매 일정</title>
  <style>
    :root {
      --navy: #ffffff;
      --navy-dark: #ffffff;
      --ink: #111827;
      --muted: #8a8f99;
      --bg: #ffffff;
      --card: #ffffff;
      --line: #e6e8ec;
      --chip: #ffffff;
      --active: #3864b8;
      --coral: #f05b3d;
      --blue-tag: #dfeaff;
      --blue-text: #2d62df;
      --green-tag: #cff7df;
      --green-text: #138449;
      --yellow-tag: #fff2bc;
      --yellow-text: #a66d00;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .top {
      background: var(--navy);
      color: #fff;
    }

    .top-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1880px;
      margin: 0 auto;
      height: 52px;
      padding: 0 24px 0 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 18px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 39px;
      height: 39px;
      border: 2px solid #ff7a53;
      border-radius: 50%;
      color: #fff;
      font-size: 11px;
      line-height: 1.05;
      text-align: center;
      box-shadow: inset 0 0 0 2px #46628f;
    }

    .fresh {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #7a8495;
      font-size: 12px;
      white-space: nowrap;
    }

    .fresh::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #41d67a;
    }

    .sub {
      background: var(--navy-dark);
      color: var(--ink);
      border-bottom: 1px solid var(--line);
    }

    .sub-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1880px;
      margin: 0 auto;
      height: 48px;
      padding: 0 24px 0 20px;
    }

    .subtitle {
      font-size: 14px;
      font-weight: 900;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      margin-bottom: 20px;
    }

    .stat {
      min-height: 74px;
      padding: 14px 16px;
      border-right: 1px solid var(--line);
    }

    .stat:last-child {
      border-right: 0;
    }

    .stat strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      font-weight: 950;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .search {
      position: relative;
      margin-bottom: 16px;
    }

    .search input {
      width: 100%;
      height: 40px;
      padding: 0 15px 0 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--ink);
      outline: none;
      font-size: 14px;
    }

    .search input:focus {
      border-color: var(--active);
      box-shadow: 0 0 0 3px rgba(43, 55, 88, 0.12);
    }

    .search svg {
      position: absolute;
      left: 14px;
      top: 50%;
      width: 17px;
      height: 17px;
      color: #a8a29a;
      transform: translateY(-50%);
    }

    .filters {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .filter-label {
      flex: 0 0 auto;
      color: #5f6470;
      font-size: 13px;
      font-weight: 800;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .pill {
      min-height: 30px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--chip);
      color: #4f5663;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.active {
      border-color: var(--active);
      background: var(--active);
      color: #fff;
    }

    .today-btn {
      display: inline-flex;
      align-items: center;
      min-height: 31px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--chip);
      color: #4f5663;
      font-size: 13px;
      font-weight: 900;
    }

    .today-btn.active {
      border-color: var(--active);
      background: var(--active);
      color: #fff;
    }

    .tabs {
      display: flex;
      gap: 20px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
    }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 38px;
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: #a09a90;
      font-size: 14px;
      font-weight: 900;
    }

    .tab.active {
      border-bottom-color: var(--active);
      color: var(--active);
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 35px;
      padding: 0 15px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      color: #9b958d;
      font-size: 12px;
      font-weight: 800;
    }

    .month-controls {
      display: none;
      align-items: center;
      gap: 8px;
    }

    .panel.is-calendar .month-controls,
    .panel.is-calendar .today-month-btn {
      display: inline-flex;
    }

    .month-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--active);
      font-size: 16px;
      font-weight: 950;
      line-height: 1;
    }

    .month-label {
      min-width: 62px;
      color: #606977;
      text-align: center;
      font-size: 12px;
      font-weight: 950;
    }

    .today-month-btn {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 0 10px;
      border: 1px solid var(--active);
      border-radius: 999px;
      background: #eef3ff;
      color: var(--active);
      font-size: 12px;
      font-weight: 950;
    }

    .list {
      display: grid;
    }

    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      gap: 20px;
      min-height: 64px;
      padding: 11px 15px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      cursor: pointer;
    }

    .item:hover {
      background: #f8fbff;
    }

    .item.is-closed {
      background: #f7f7f7;
      color: #8a8f99;
      opacity: 0.66;
    }

    .item.is-closed:hover {
      background: #f3f4f6;
    }

    .item:last-child {
      border-bottom: 0;
    }

    .item-main {
      min-width: 0;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 5px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 7px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 900;
    }

    .tag-main {
      background: var(--blue-tag);
      color: var(--blue-text);
    }

    .tag-main.main-child {
      background: #ffe1ef;
      color: #c0266a;
    }

    .tag-sub {
      background: var(--green-tag);
      color: var(--green-text);
    }

    .tag-sub.sub-food {
      background: #ffe3c2;
      color: #b45309;
    }

    .tag-sub.sub-beauty {
      background: #fce7f3;
      color: #be185d;
    }

    .tag-sub.sub-life {
      background: #dbeafe;
      color: #1e3a8a;
    }

    .tag-sub.sub-fashion {
      background: #ede9fe;
      color: #6d28d9;
    }

    .tag-sub.sub-book,
    .tag-sub.sub-furniture {
      background: #dcfce7;
      color: #166534;
    }

    .tag-sub.sub-education {
      background: #e0f2fe;
      color: #0369a1;
    }

    .tag-sub.sub-tool {
      background: #ffedd5;
      color: #c2410c;
    }

    .tag-sub.sub-toy {
      background: #fee2e2;
      color: #b91c1c;
    }

    .tag-sub.sub-travel {
      background: #ccfbf1;
      color: #0f766e;
    }

    .tag-sub.sub-etc {
      background: #f1f5f9;
      color: #475569;
    }

    .title {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .item-side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      min-width: 0;
      text-align: right;
    }

    .date-line {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      color: #6b7280;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .date-line.is-today {
      color: var(--coral);
    }

    .date-line.is-soon {
      color: #db2777;
    }

    .date-line.is-closed {
      color: #9ca3af;
    }

    .dday {
      display: inline-flex;
      align-items: center;
      min-height: 21px;
      padding: 0 7px;
      border-radius: 999px;
      background: #ffe9e3;
      color: var(--coral);
      font-size: 11px;
      font-weight: 950;
    }

    .dday.is-soon {
      background: #ffe5ef;
      color: #db2777;
    }

    .dday.is-today {
      background: #ffe9e3;
      color: var(--coral);
    }

    .dday.is-muted {
      background: #eef0f3;
      color: #6b7280;
    }

    .dday.is-closed {
      background: #e8eaee;
      color: #9ca3af;
    }

    .insta {
      color: #656972;
      font-size: 12px;
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .empty,
    .error,
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .error {
      color: var(--coral);
    }

    .calendar {
      display: grid;
    }

    .calendar-head {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .calendar-head div {
      min-height: 34px;
      padding: 9px 8px;
      color: #9b958d;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .day-cell {
      min-height: 126px;
      padding: 8px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .day-cell:nth-child(7n) {
      border-right: 0;
    }

    .day-cell.is-muted {
      background: #f8fafc;
    }

    .day-number {
      display: flex;
      align-items: center;
      height: 24px;
      margin-bottom: 7px;
      color: #585f6b;
      font-size: 12px;
      font-weight: 900;
    }

    .day-cell.is-today .day-number {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .day-cell.is-today .day-number span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--active);
      color: #fff;
    }

    .calendar-items {
      display: grid;
      gap: 5px;
    }

    .calendar-count {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 32px;
      padding: 5px 7px;
      border: 1px solid #d9e2f5;
      border-radius: 6px;
      background: #eef3ff;
      color: #27395f;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .calendar-view-btn {
      width: 100%;
      min-height: 28px;
      padding: 5px 7px;
      border: 1px solid var(--active);
      border-radius: 6px;
      background: #fff;
      color: var(--active);
      font-size: 12px;
      font-weight: 950;
    }

    .calendar-more {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(17, 24, 39, 0.48);
    }

    .modal.open {
      display: flex;
    }

    .dialog {
      position: relative;
      width: min(420px, 100%);
      padding: 30px 28px 26px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.28);
    }

    .close-btn {
      position: absolute;
      top: 13px;
      right: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 999px;
      background: #f1eee8;
      color: #9a8d7f;
      font-size: 24px;
      line-height: 1;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }

    .modal-title {
      margin: 0 0 16px;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
      color: #6c6570;
      font-size: 14px;
      font-weight: 700;
    }

    .modal-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 42px;
      border-radius: 8px;
      background: linear-gradient(90deg, #ffc244, #f43f8f, #842bd4);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 950;
    }

    .modal-link[hidden] {
      display: none;
    }

    .day-list {
      display: grid;
      gap: 8px;
      flex: 1 0 100%;
      max-height: 360px;
      overflow: auto;
    }

    .day-list-item {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      text-align: left;
    }

    .day-list-item.is-closed {
      background: #f4f4f5;
      color: #8a8f99;
      opacity: 0.72;
    }

    .day-list-title {
      display: block;
      margin-top: 6px;
      font-size: 14px;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .day-list-meta {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    @media (max-width: 1100px) {
      .wrap {
        padding-left: 10px;
        padding-right: 10px;
      }
    }

    @media (max-width: 720px) {
      .top-inner {
        height: 44px;
        padding: 0 16px;
      }

      .brand {
        gap: 10px;
        font-size: 17px;
      }

      .logo {
        width: 33px;
        height: 33px;
        font-size: 10px;
      }

      .sub-inner {
        height: 44px;
        padding: 0 14px;
      }

      .wrap {
        padding: 12px 10px 42px;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-bottom: 20px;
      }

      .stat {
        min-height: 70px;
        border-bottom: 1px solid var(--line);
      }

      .stat:nth-child(2n) {
        border-right: 0;
      }

      .stat:nth-last-child(-n + 2) {
        border-bottom: 0;
      }

      .filter-row {
        align-items: flex-start;
      }

      .filter-label {
        width: 42px;
        padding-top: 7px;
      }

      .pill-list {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }

      .pill-list::-webkit-scrollbar {
        display: none;
      }

      .tabs {
        margin-bottom: 18px;
      }

      .panel {
        border: 0;
        background: transparent;
      }

      .panel-head {
        display: flex;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        margin-bottom: 9px;
      }

      .calendar-head {
        display: none;
      }

      .calendar-grid {
        display: grid;
        gap: 9px;
      }

      .day-cell {
        display: none;
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }

      .day-cell.has-items {
        display: block;
      }

      .day-cell.is-muted {
        background: #ffffff;
      }

      .list {
        gap: 9px;
      }

      .item {
        grid-template-columns: minmax(0, 1fr) auto;
        min-height: 69px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 12px 16px;
      }

      .title {
        font-size: 16px;
      }

      .item-side {
        min-width: 70px;
      }
    }

    @media (max-width: 420px) {
      .fresh {
        font-size: 11px;
      }

      .item {
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .item-side {
        align-items: flex-start;
        text-align: left;
      }

      .date-line {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <section class="sub">
    <div class="sub-inner">
      <div class="subtitle">📦 5월 공동구매 일정 모음</div>
      <div class="fresh" id="syncStatus">최신 데이터</div>
    </div>
  </section>

  <main class="wrap">
    <section class="stats" aria-label="요약">
      <div class="stat">
        <strong id="totalCount">0</strong>
        <span>전체 공구</span>
      </div>
      <div class="stat">
        <strong id="todayCount">0</strong>
        <span>🔥 오늘 오픈</span>
      </div>
      <div class="stat">
        <strong id="weekCount">0</strong>
        <span>이번 주</span>
      </div>
      <div class="stat">
        <strong id="categoryCount">0</strong>
        <span>카테고리</span>
      </div>
    </section>

    <section class="search" aria-label="검색">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="m21 21-4.35-4.35m2.35-5.15a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      </svg>
      <input id="searchInput" type="search" placeholder="품목명, 인플루언서, 아이디 검색...">
    </section>

    <section class="filters" aria-label="필터">
      <div class="filter-row">
        <div class="filter-label">오늘</div>
        <button class="today-btn" id="todayBtn" type="button">🔥 오늘 오픈만 보기</button>
      </div>

      <div class="filter-row">
        <div class="filter-label">대분류</div>
        <div class="pill-list" id="mainCategoryPills"></div>
      </div>

      <div class="filter-row">
        <div class="filter-label">소분류</div>
        <div class="pill-list" id="subCategoryPills"></div>
      </div>
    </section>

    <section class="tabs" aria-label="보기 방식">
      <button class="tab active" id="listTab" type="button">▣ 리스트</button>
      <button class="tab" id="calendarTab" type="button">□ 캘린더</button>
    </section>

    <section class="panel" id="panel">
      <div class="panel-head">
        <div class="month-controls">
          <button class="month-btn" id="prevMonthBtn" type="button" aria-label="이전 달">&lt;</button>
          <span class="month-label" id="monthLabel">이번 달</span>
          <button class="month-btn" id="nextMonthBtn" type="button" aria-label="다음 달">&gt;</button>
        </div>
        <span>공구 일정</span>
        <button class="today-month-btn" id="goTodayBtn" type="button">오늘</button>
      </div>
      <div id="content">
        <div class="loading">정보를 불러오는 중입니다.</div>
      </div>
    </section>
  </main>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="close-btn" id="closeModalBtn" type="button" aria-label="닫기">×</button>
      <div class="modal-tags" id="modalTags"></div>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-meta" id="modalMeta"></div>
      <a class="modal-link" id="modalInstagramLink" target="_blank" rel="noopener">인스타 바로가기</a>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxB1i-ATS7NuRuQu3L_PiLPzvk7ZdNTrUCWSHP1KyV2TYJ2J2SJHuJSXf-49yOkVK6k/exec';
    const REFRESH_INTERVAL_MS = 30000;
    const DEFAULT_MAIN_CATEGORIES = ['성인', '육아'];
    const DEFAULT_SUB_CATEGORIES = ['가전', '건강', '식품', '뷰티', '생활', '패션', '책', '교육', '교구', '장난감', '가구', '여행', '기타'];

    const state = {
      items: [],
      filteredItems: [],
      search: '',
      todayOnly: false,
      view: 'list',
      calendarMonth: null,
      filters: {
        mainCategory: '',
        subCategory: ''
      }
    };

    const elements = {
      searchInput: document.getElementById('searchInput'),
      todayBtn: document.getElementById('todayBtn'),
      listTab: document.getElementById('listTab'),
      calendarTab: document.getElementById('calendarTab'),
      panel: document.getElementById('panel'),
      prevMonthBtn: document.getElementById('prevMonthBtn'),
      nextMonthBtn: document.getElementById('nextMonthBtn'),
      goTodayBtn: document.getElementById('goTodayBtn'),
      monthLabel: document.getElementById('monthLabel'),
      mainCategoryPills: document.getElementById('mainCategoryPills'),
      subCategoryPills: document.getElementById('subCategoryPills'),
      syncStatus: document.getElementById('syncStatus'),
      totalCount: document.getElementById('totalCount'),
      todayCount: document.getElementById('todayCount'),
      weekCount: document.getElementById('weekCount'),
      categoryCount: document.getElementById('categoryCount'),
      content: document.getElementById('content'),
      modal: document.getElementById('modal'),
      closeModalBtn: document.getElementById('closeModalBtn'),
      modalTags: document.getElementById('modalTags'),
      modalTitle: document.getElementById('modalTitle'),
      modalMeta: document.getElementById('modalMeta'),
      modalInstagramLink: document.getElementById('modalInstagramLink')
    };

    init();

    function init() {
      bindEvents();
      loadItems();

      setInterval(function() {
        loadItems(true);
      }, REFRESH_INTERVAL_MS);
    }

    function bindEvents() {
      elements.searchInput.addEventListener('input', function(event) {
        state.search = event.target.value.trim();
        applyFilters();
      });

      elements.todayBtn.addEventListener('click', function() {
        state.todayOnly = !state.todayOnly;
        elements.todayBtn.classList.toggle('active', state.todayOnly);
        applyFilters();
      });

      elements.listTab.addEventListener('click', function() {
        setView('list');
      });

      elements.calendarTab.addEventListener('click', function() {
        setView('calendar');
      });

      elements.prevMonthBtn.addEventListener('click', function() {
        moveCalendarMonth(-1);
      });

      elements.nextMonthBtn.addEventListener('click', function() {
        moveCalendarMonth(1);
      });

      elements.goTodayBtn.addEventListener('click', function() {
        const today = new Date();
        state.calendarMonth = new Date(today.getFullYear(), today.getMonth(), 1);
        applyFilters();
      });

      elements.closeModalBtn.addEventListener('click', closeModal);
      elements.modal.addEventListener('click', function(event) {
        if (event.target === elements.modal) {
          closeModal();
        }
      });

      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
          closeModal();
        }
      });
    }

    async function loadItems(isSilent) {
      if (!API_URL || API_URL.indexOf('여기에_') === 0) {
        renderError('HTML 코드의 API_URL에 Apps Script 웹앱 URL을 넣어주세요.');
        return;
      }

      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || '데이터를 불러오지 못했습니다.');
        }

        state.items = normalizeItems(data.items || []);
        elements.syncStatus.textContent = '최신 데이터';
        renderStats();
        renderFilterPills();
        applyFilters();
      } catch (error) {
        if (!isSilent) {
          renderError(error.message);
        }
      }
    }

    function normalizeItems(items) {
      return items.map(function(item) {
        return {
          productName: clean(item.productName),
          mainCategory: clean(item.mainCategory),
          subCategory: clean(item.subCategory),
          openDate: clean(item.openDate || item.date),
          closeDate: clean(item.closeDate),
          displayDate: clean(item.displayDate || item.closeDate || item.openDate || item.date),
          isAlwaysOpen: Boolean(item.isAlwaysOpen || (item.openDate && !item.closeDate)),
          isClosed: Boolean(item.isClosed),
          instagramUrl: clean(item.instagramUrl),
          influencer: clean(item.influencer),
          instagramId: clean(item.instagramId),
          lastEditedTime: clean(item.lastEditedTime)
        };
      });
    }

    function renderStats() {
      const monthItems = state.items.filter(isCurrentMonthItem);
      elements.totalCount.textContent = monthItems.length;
      elements.todayCount.textContent = monthItems.filter(isTodayItem).length;
      elements.weekCount.textContent = monthItems.filter(isThisWeekItem).length;
      elements.categoryCount.textContent = uniqueValues(monthItems, 'subCategory').length || uniqueValues(monthItems, 'mainCategory').length;
    }

    function renderFilterPills() {
      renderPillGroup(elements.mainCategoryPills, ['전체'].concat(mergedValues(DEFAULT_MAIN_CATEGORIES, uniqueValues(state.items, 'mainCategory'))), state.filters.mainCategory || '전체', function(value) {
        state.filters.mainCategory = value === '전체' ? '' : value;
        state.filters.subCategory = '';
        renderFilterPills();
        applyFilters();
      });

      const subSource = state.filters.mainCategory
        ? state.items.filter(function(item) {
          return item.mainCategory === state.filters.mainCategory;
        })
        : state.items;

      renderPillGroup(elements.subCategoryPills, ['전체'].concat(mergedValues(DEFAULT_SUB_CATEGORIES, uniqueValues(subSource, 'subCategory'))), state.filters.subCategory || '전체', function(value) {
        state.filters.subCategory = value === '전체' ? '' : value;
        renderFilterPills();
        applyFilters();
      });
    }

    function renderPillGroup(container, values, activeValue, onClick) {
      container.innerHTML = values.map(function(value) {
        const active = value === activeValue ? ' active' : '';
        return '<button class="pill' + active + '" type="button" data-value="' + escapeHtml(value) + '">' + escapeHtml(value) + '</button>';
      }).join('');

      Array.prototype.forEach.call(container.querySelectorAll('.pill'), function(button) {
        button.addEventListener('click', function() {
          onClick(button.getAttribute('data-value'));
        });
      });
    }

    function applyFilters() {
      const keyword = state.search.toLowerCase();

      state.filteredItems = state.items.filter(function(item) {
        const text = [
          item.productName,
          item.mainCategory,
          item.subCategory,
          item.influencer,
          item.instagramId
        ].join(' ').toLowerCase();

        return (state.view === 'calendar' || isCurrentMonthItem(item))
          && (!keyword || text.indexOf(keyword) !== -1)
          && (!state.todayOnly || isTodayItem(item))
          && (!state.filters.mainCategory || item.mainCategory === state.filters.mainCategory)
          && (!state.filters.subCategory || item.subCategory === state.filters.subCategory);
      }).sort(compareItems);

      renderCurrentView();
    }

    function setView(view) {
      state.view = view;
      elements.listTab.classList.toggle('active', view === 'list');
      elements.calendarTab.classList.toggle('active', view === 'calendar');
      elements.panel.classList.toggle('is-calendar', view === 'calendar');
      if (view === 'calendar' && !state.calendarMonth) {
        state.calendarMonth = getInitialCalendarMonth();
      }
      applyFilters();
    }

    function moveCalendarMonth(offset) {
      const base = state.calendarMonth || getInitialCalendarMonth();
      state.calendarMonth = new Date(base.getFullYear(), base.getMonth() + offset, 1);
      applyFilters();
    }

    function renderCurrentView() {
      if (state.view === 'calendar') {
        renderCalendar();
        return;
      }
      renderItems();
    }

    function renderItems() {
      if (!state.filteredItems.length) {
        elements.content.innerHTML = '<div class="empty">조건에 맞는 공구 일정이 없습니다.</div>';
        return;
      }

      elements.content.innerHTML = '<div class="list">' + state.filteredItems.map(renderItem).join('') + '</div>';

      Array.prototype.forEach.call(elements.content.querySelectorAll('.item'), function(itemEl) {
        itemEl.addEventListener('click', function(event) {
          if (event.target.closest('a')) {
            return;
          }
          openModal(Number(itemEl.getAttribute('data-index')));
        });
      });
    }

    function renderCalendar() {
      const monthBase = state.calendarMonth || getInitialCalendarMonth();
      state.calendarMonth = monthBase;
      elements.monthLabel.textContent = monthBase.getFullYear() + '.' + String(monthBase.getMonth() + 1).padStart(2, '0');
      const firstDay = new Date(monthBase.getFullYear(), monthBase.getMonth(), 1);
      const start = new Date(firstDay);
      start.setDate(firstDay.getDate() - firstDay.getDay());

      const cells = [];
      for (let i = 0; i < 42; i += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        cells.push(renderCalendarCell(date, monthBase));
      }

      elements.content.innerHTML = [
        '<div class="calendar">',
          '<div class="calendar-head">',
            '<div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>',
          '</div>',
          '<div class="calendar-grid">',
            cells.join(''),
          '</div>',
        '</div>'
      ].join('');

      Array.prototype.forEach.call(elements.content.querySelectorAll('.calendar-view-btn'), function(itemEl) {
        itemEl.addEventListener('click', function() {
          openDayModal(itemEl.getAttribute('data-date'));
        });
      });
    }

    function renderCalendarCell(date, monthBase) {
      const key = dateKey(date);
      const todayKey = dateKey(new Date());
      const items = state.filteredItems.filter(function(item) {
        const itemDate = parseItemDate(item.displayDate);
        return itemDate && dateKey(itemDate) === key;
      }).sort(compareItems);
      const classes = [
        'day-cell',
        date.getMonth() !== monthBase.getMonth() ? 'is-muted' : '',
        key === todayKey ? 'is-today' : '',
        items.length ? 'has-items' : ''
      ].filter(Boolean).join(' ');

      return [
        '<div class="' + classes + '">',
          '<div class="day-number"><span>' + date.getDate() + '</span></div>',
          '<div class="calendar-items">',
            items.length ? '<div class="calendar-count">' + items.length + '개</div>' : '',
            items.length ? '<button class="calendar-view-btn" type="button" data-date="' + key + '">전체보기</button>' : '',
          '</div>',
        '</div>'
      ].join('');
    }

    function getInitialCalendarMonth() {
      const firstDatedItem = state.filteredItems.map(function(item) {
        return parseItemDate(item.displayDate);
      }).filter(Boolean).sort(function(a, b) {
        return a - b;
      })[0];
      const base = firstDatedItem || new Date();
      return new Date(base.getFullYear(), base.getMonth(), 1);
    }

    function renderItem(item, index) {
      const url = normalizeUrl(item.instagramUrl);
      const title = item.productName || '상품명 없음';
      const main = item.mainCategory || '분류';
      const sub = item.subCategory || '기타';
      const dateText = formatShortDate(item.displayDate);
      const dday = getDdayLabel(item);
      const dateClass = getDateClass(item);
      const ddayClass = getDdayClass(item);
      const closed = isClosedItem(item);
      const instaText = item.instagramId || item.influencer || '-';
      const mainClass = getMainTagClass(main);
      const subClass = getSubTagClass(sub);

      return [
        '<article class="item' + (closed ? ' is-closed' : '') + '" data-index="' + index + '">',
          '<div class="item-main">',
            '<div class="tags">',
              '<span class="tag tag-main ' + mainClass + '">' + escapeHtml(main) + '</span>',
              '<span class="tag tag-sub ' + subClass + '">' + escapeHtml(sub) + '</span>',
            '</div>',
            '<h2 class="title">' + escapeHtml(title) + '</h2>',
          '</div>',
          '<div class="item-side">',
            '<div class="date-line ' + dateClass + '">',
              dateText ? '<span>' + escapeHtml(dateText) + '</span>' : '',
              dday ? '<span class="dday ' + ddayClass + '">' + escapeHtml(dday) + '</span>' : '',
            '</div>',
            url
              ? '<a class="insta" href="' + escapeHtml(url) + '" target="_blank" rel="noopener">◎ ' + escapeHtml(instaText) + '</a>'
              : '<span class="insta">◎ ' + escapeHtml(instaText) + '</span>',
          '</div>',
        '</article>'
      ].join('');
    }

    function compareItems(a, b) {
      const closedA = isClosedItem(a);
      const closedB = isClosedItem(b);

      if (closedA !== closedB) {
        return closedA ? 1 : -1;
      }

      const dateA = parseItemDate(a.displayDate);
      const dateB = parseItemDate(b.displayDate);

      if (dateA && dateB && dateA.getTime() !== dateB.getTime()) {
        return dateA - dateB;
      }

      if (dateA && !dateB) return -1;
      if (!dateA && dateB) return 1;

      return getEditedTime(b) - getEditedTime(a);
    }

    function getEditedTime(item) {
      const time = new Date(item.lastEditedTime).getTime();
      return Number.isNaN(time) ? 0 : time;
    }

    function openModal(index) {
      const item = state.filteredItems[index];
      if (!item) return;

      const main = item.mainCategory || '분류';
      const sub = item.subCategory || '기타';
      const mainClass = getMainTagClass(main);
      const subClass = getSubTagClass(sub);
      const dateText = formatKoreanDate(item.displayDate);
      const dateSuffix = item.isAlwaysOpen ? ' · 상시' : '';
      const instaText = item.instagramId || item.influencer || '';
      const url = normalizeUrl(item.instagramUrl);

      elements.modalTags.innerHTML = [
        '<span class="tag tag-main ' + mainClass + '">' + escapeHtml(main) + '</span>',
        '<span class="tag tag-sub ' + subClass + '">' + escapeHtml(sub) + '</span>'
      ].join('');
      elements.modalTitle.textContent = item.productName || '상품명 없음';
      elements.modalMeta.innerHTML = [
        dateText ? '<span>🗓️ ' + escapeHtml(dateText + dateSuffix) + '</span>' : '',
        instaText ? '<span>👤 ' + escapeHtml(instaText) + '</span>' : ''
      ].filter(Boolean).join('');

      if (url) {
        elements.modalInstagramLink.href = url;
        elements.modalInstagramLink.textContent = instaText ? '◎ ' + instaText + ' 인스타 바로가기' : '인스타 바로가기';
        elements.modalInstagramLink.hidden = false;
      } else {
        elements.modalInstagramLink.hidden = true;
        elements.modalInstagramLink.removeAttribute('href');
      }

      elements.modal.classList.add('open');
      elements.modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      elements.modal.classList.remove('open');
      elements.modal.setAttribute('aria-hidden', 'true');
    }

    function openDayModal(dateKeyValue) {
      const items = state.filteredItems.filter(function(item) {
        const itemDate = parseItemDate(item.displayDate);
        return itemDate && dateKey(itemDate) === dateKeyValue;
      }).sort(compareItems);

      if (!items.length) return;

      const date = parseItemDate(dateKeyValue);
      elements.modalTags.innerHTML = '<span class="tag tag-main">전체보기</span>';
      elements.modalTitle.textContent = formatKoreanDate(dateKeyValue) + ' 마감 공구';
      elements.modalMeta.innerHTML = '<span>' + items.length + '개 일정</span>';
      elements.modalInstagramLink.hidden = true;
      elements.modalInstagramLink.removeAttribute('href');

      const list = document.createElement('div');
      list.className = 'day-list';
      list.innerHTML = items.map(function(item) {
        const index = state.filteredItems.indexOf(item);
        const closed = isClosedItem(item);
        const main = item.mainCategory || '분류';
        const sub = item.subCategory || '기타';
        const mainClass = getMainTagClass(main);
        const subClass = getSubTagClass(sub);
        const instaText = item.instagramId || item.influencer || '-';

        return [
          '<button class="day-list-item' + (closed ? ' is-closed' : '') + '" type="button" data-index="' + index + '">',
            '<span class="tag tag-main ' + mainClass + '">' + escapeHtml(main) + '</span> ',
            '<span class="tag tag-sub ' + subClass + '">' + escapeHtml(sub) + '</span>',
            '<span class="day-list-title">' + escapeHtml(item.productName || '상품명 없음') + '</span>',
            '<span class="day-list-meta">◎ ' + escapeHtml(instaText) + '</span>',
          '</button>'
        ].join('');
      }).join('');

      elements.modalMeta.appendChild(list);
      Array.prototype.forEach.call(list.querySelectorAll('.day-list-item'), function(button) {
        button.addEventListener('click', function() {
          openModal(Number(button.getAttribute('data-index')));
        });
      });

      elements.modal.classList.add('open');
      elements.modal.setAttribute('aria-hidden', 'false');
    }

    function isTodayItem(item) {
      const date = parseItemDate(item.openDate);
      if (!date) return false;
      const today = new Date();
      return date.getFullYear() === today.getFullYear()
        && date.getMonth() === today.getMonth()
        && date.getDate() === today.getDate();
    }

    function isThisWeekItem(item) {
      const date = parseItemDate(item.displayDate);
      if (!date) return false;
      const today = new Date();
      const start = new Date(today);
      start.setHours(0, 0, 0, 0);
      start.setDate(today.getDate() - today.getDay());
      const end = new Date(start);
      end.setDate(start.getDate() + 7);
      return date >= start && date < end;
    }

    function isCurrentMonthItem(item) {
      const date = parseItemDate(item.displayDate);
      if (!date) return false;
      const today = new Date();
      return date.getFullYear() === today.getFullYear()
        && date.getMonth() === today.getMonth();
    }

    function isClosedItem(item) {
      if (item.isClosed) return true;
      if (item.closeDate) {
        const closeDate = parseItemDate(item.closeDate);
        if (!closeDate) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        closeDate.setHours(0, 0, 0, 0);
        return closeDate < today;
      }
      return false;
    }

    function getDateClass(item) {
      if (isClosedItem(item)) return 'is-closed';
      const date = parseItemDate(item.displayDate);
      if (!date) return '';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      date.setHours(0, 0, 0, 0);
      const diff = Math.round((date - today) / 86400000);
      if (diff === 0) return 'is-today';
      if (diff > 0 && diff <= 3) return 'is-soon';
      return '';
    }

    function getDdayClass(item) {
      if (isClosedItem(item)) return 'is-closed';
      if (item.isAlwaysOpen) return 'is-muted';
      const date = parseItemDate(item.displayDate);
      if (!date) return '';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      date.setHours(0, 0, 0, 0);
      const diff = Math.round((date - today) / 86400000);
      if (diff === 0) return 'is-today';
      if (diff > 0 && diff <= 3) return 'is-soon';
      return 'is-muted';
    }

    function parseItemDate(value) {
      if (!value) return null;
      const text = String(value).trim();
      const normalized = text.indexOf('-') === -1 && text.indexOf('/') === -1
        ? text.replace(/^(\d{1,2})\.(\d{1,2})$/, new Date().getFullYear() + '-$1-$2')
        : text.replace(/\./g, '-').replace(/\//g, '-');
      const date = new Date(normalized);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function formatShortDate(value) {
      const date = parseItemDate(value);
      if (!date) return value || '';
      return (date.getMonth() + 1) + '/' + date.getDate();
    }

    function getDdayLabel(item) {
      if (isClosedItem(item)) return '종료';
      if (item.isAlwaysOpen) return '상시';
      const date = parseItemDate(item.displayDate);
      if (!date) return '';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      date.setHours(0, 0, 0, 0);
      const diff = Math.round((date - today) / 86400000);
      if (diff === 0) return 'D-day';
      if (diff > 0) return 'D-' + diff;
      return '마감';
    }

    function dateKey(date) {
      return [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, '0'),
        String(date.getDate()).padStart(2, '0')
      ].join('-');
    }

    function getMainTagClass(value) {
      return String(value || '').trim() === '육아' ? 'main-child' : '';
    }

    function getSubTagClass(value) {
      const key = String(value || '').trim();
      const map = {
        '식품': 'sub-food',
        '뷰티': 'sub-beauty',
        '생활': 'sub-life',
        '패션': 'sub-fashion',
        '책': 'sub-book',
        '교육': 'sub-education',
        '교구': 'sub-tool',
        '장난감': 'sub-toy',
        '가구': 'sub-furniture',
        '여행': 'sub-travel',
        '기타': 'sub-etc'
      };

      return map[key] || '';
    }

    function uniqueValues(items, key) {
      return Array.from(new Set(items.map(function(item) {
        return item[key];
      }).filter(Boolean))).sort(function(a, b) {
        return String(a).localeCompare(String(b), 'ko');
      });
    }

    function mergedValues(defaultValues, dataValues) {
      return Array.from(new Set(defaultValues.concat(dataValues))).filter(Boolean);
    }

    function formatKoreanDate(value) {
      const date = parseItemDate(value);
      if (!date) return value || '';
      return (date.getMonth() + 1) + '월 ' + date.getDate() + '일';
    }

    function renderError(message) {
      elements.syncStatus.textContent = '연결 확인 필요';
      elements.content.innerHTML = '<div class="error">' + escapeHtml(message) + '</div>';
    }

    function clean(value) {
      return value === null || value === undefined ? '' : String(value).trim();
    }

    function normalizeUrl(url) {
      if (!url) return '';
      if (/^https?:\/\//i.test(url)) return url;
      return 'https://' + url;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
