<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clonote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:       #fbfbf8;
      --paper-r:     #f8f8f5;
      --line:        rgba(132, 184, 196, 0.45);
      --red-line:    rgba(208, 112, 112, 0.42);
      --text:        #2f2f2f;
      --muted:       #8a8a8a;
      --sat:         #5d86c8;
      --sun:         #d06f6f;
      --accent:      #5d86c8;
      --spine:       #d8d4cc;

      --row-h:       28px;
      --left-date:   52px;
      --left-margin: 60px;
      --right-date:  48px;
      --right-margin:56px;
      --total-w:     28px;
    }

    html, body {
      background: transparent;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    .book-outer {
      max-width: 100%;
      width: 100%;
      margin: 0 auto;
      padding: 8px 0 12px;
    }

    .book-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 0 12px;
    }

    .book-nav { display: flex; align-items: center; gap: 6px; }

    .month-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #3a3630;
      white-space: nowrap;
    }

    .icon-btn, .text-btn, .menu-btn {
      border: none; background: transparent; cursor: pointer; padding: 0;
      color: #3a3630; transition: opacity 0.15s, transform 0.15s;
    }
    .icon-btn  { font-size: 20px; font-weight: 700; width: 24px; height: 24px; line-height: 1; }
    .text-btn  { height: 30px; padding: 0 12px; font-size: 12px; font-weight: 600; border-radius: 8px; background: rgba(255,255,255,0.6); white-space: nowrap; }
    .menu-btn  { font-size: 18px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
    .icon-btn:hover, .text-btn:hover, .menu-btn:hover { opacity: 0.65; transform: translateY(-1px); }

    .user-block { display: flex; align-items: center; gap: 6px; }
    .user-name  { font-size: 13px; font-weight: 600; color: #3a3630; white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }

    .menu-wrap { position: relative; display: none; }
    .menu-wrap.show { display: block; }
    .menu-pop  { display: none; position: absolute; top: 26px; right: 0; min-width: 88px; background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 6px; z-index: 30; }
    .menu-pop.show { display: block; }
    .menu-item { width: 100%; height: 30px; border: none; background: transparent; border-radius: 8px; text-align: left; padding: 0 10px; font-size: 12px; cursor: pointer; }
    .menu-item:hover { background: #f5f5f5; }

    /* login */
    .login-box { display: none; background: rgba(255,255,255,0.82); border: 1px solid rgba(0,0,0,0.06); border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; }
    .login-box.show { display: block; }
    .guide { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .login-row { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
    .inp { height: 30px; border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; padding: 0 10px; font-size: 12px; outline: none; background: rgba(255,255,255,0.95); flex: 1; }
    .inp:focus { border-color: rgba(0,0,0,0.18); }
    .status-bar { min-height: 14px; font-size: 11px; color: #666; margin: 3px 2px 0; }

    /* ══════════════════════════════
       BOOK SPREAD
    ══════════════════════════════ */
    .book-spread {
      display: flex;
      overflow: hidden;
    }

    /* 왼쪽 페이지 */
    .page-left {
      flex: 1;
      min-width: 0;
      background: var(--paper);
      padding: 0 14px 14px 16px;
      background-image:
        linear-gradient(to right,
          transparent 0,
          transparent calc(var(--left-margin) - 1px),
          var(--red-line) calc(var(--left-margin) - 1px),
          var(--red-line) calc(var(--left-margin) + 1px),
          transparent calc(var(--left-margin) + 1px)
        ),
        repeating-linear-gradient(to bottom,
          transparent 0,
          transparent calc(var(--row-h) - 1px),
          var(--line) calc(var(--row-h) - 1px),
          var(--line) var(--row-h)
        );
    }

    /* 제본선 (가운데) */
    .spine {
      width: 18px;
      flex-shrink: 0;
      background: linear-gradient(to right, #ccc8c0, #e0dcd4, #ccc8c0);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 8px;
      gap: 14px;
    }
    .spine::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 2px; right: 2px;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 10px,
        rgba(0,0,0,0.06) 10px,
        rgba(0,0,0,0.06) 11px
      );
    }
    .ring {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1.5px solid #b0aca4;
      background: #e8e4dc;
      position: relative; z-index: 1;
      flex-shrink: 0;
    }

    /* 오른쪽 페이지 */
    .page-right {
      flex: 1;
      min-width: 0;
      background: var(--paper-r);
      padding: 0 16px 14px 14px;
      background-image:
        linear-gradient(to right,
          transparent 0,
          transparent calc(var(--right-margin) - 1px),
          var(--red-line) calc(var(--right-margin) - 1px),
          var(--red-line) calc(var(--right-margin) + 1px),
          transparent calc(var(--right-margin) + 1px)
        ),
        repeating-linear-gradient(to bottom,
          transparent 0,
          transparent calc(var(--row-h) - 1px),
          var(--line) calc(var(--row-h) - 1px),
          var(--line) var(--row-h)
        );
    }

    /* ══════════════════════════════
       PAGE HEADER (탭 + 제목)
    ══════════════════════════════ */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--row-h);
      padding: 0 2px;
      margin-bottom: 0;
    }
    .page-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding-left: 2px;
    }
    .tab-pills { display: flex; gap: 3px; }
    .tab-pill {
      border: none; background: transparent; font-size: 10px; font-weight: 700;
      color: var(--muted); padding: 2px 7px; border-radius: 6px; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .tab-pill.active { background: rgba(93,134,200,0.14); color: var(--accent); }

    /* ══════════════════════════════
       ROWS
    ══════════════════════════════ */
    .day-cell {
      height: var(--row-h);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #777;
      white-space: nowrap; flex-shrink: 0;
    }
    .day-cell.sat { color: var(--sat); }
    .day-cell.sun { color: var(--sun); }

    /* ── Memo row ── */
    .memo-row {
      display: grid;
      grid-template-columns: var(--left-date) 1fr;
      height: var(--row-h);
      align-items: center;
    }
    .memo-cell { display: flex; align-items: center; height: var(--row-h); padding: 0 6px; position: relative; overflow: hidden; min-width: 0; }
    .memo-input {
      width: 100%; height: 100%; border: none; outline: none; background: transparent;
      padding: 0; font-size: 12px; color: var(--text); line-height: 1;
      overflow-x: auto; overflow-y: hidden; white-space: nowrap;
    }
    .memo-input:disabled { color: rgba(0,0,0,0.38); cursor: default; }
    .save-ind { position: absolute; right: 2px; top: 50%; transform: translateY(-50%); font-size: 9px; color: #9a9a9a; opacity: 0; transition: opacity 0.15s; pointer-events: none; background: rgba(251,251,248,0.92); padding-left: 4px; }
    .save-ind.show { opacity: 1; }

    /* ── Habit header row ── */
    .habit-hdr {
      display: grid;
      align-items: center;
      height: var(--row-h);
    }
    .hdr-cell {
      font-size: 9px; font-weight: 700; color: var(--muted);
      text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      padding: 0 2px;
      display: flex; align-items: center; justify-content: center;
    }
    .hdr-total { width: var(--total-w); font-size: 9px; font-weight: 700; color: var(--accent); text-align: center; display: flex; align-items: center; justify-content: center; }

    /* ── Check row ── */
    .check-row {
      display: grid;
      align-items: center;
      height: var(--row-h);
    }
    .cb-wrap { display: flex; align-items: center; justify-content: center; }
    .cb-wrap input[type="checkbox"] { width: 13px; height: 13px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
    .cb-wrap input[type="checkbox"]:disabled { opacity: 0.3; cursor: default; }
    .total-cell { width: var(--total-w); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent); height: var(--row-h); }

    /* ── Habit setup row ── */
    .setup-row { display: grid; grid-template-columns: var(--right-date) 1fr; height: var(--row-h); align-items: center; }
    .setup-num { height: var(--row-h); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); }
    .setup-inp-wrap { display: flex; align-items: center; height: var(--row-h); padding: 0 6px; }
    .setup-inp { width: 100%; height: 100%; border: none; outline: none; background: transparent; font-size: 11px; color: var(--text); }
    .setup-inp::placeholder { color: #c0c0c0; }
    .setup-inp:disabled { color: rgba(0,0,0,0.35); cursor: default; }

    /* ── Graph ── */
    .graph-wrap { padding: 4px 0; overflow: hidden; }
    canvas.graph { display: block; max-width: 100%; }

    /* ── Week nav ── */
    .week-nav { display: flex; align-items: center; justify-content: space-between; height: var(--row-h); }
    .week-lbl  { font-size: 10px; font-weight: 700; color: var(--muted); }
    .w-arrow   { border: none; background: transparent; color: #999; font-size: 15px; font-weight: 700; cursor: pointer; padding: 0 3px; line-height: 1; transition: opacity 0.15s; }
    .w-arrow:hover { opacity: 0.55; }
    .w-arrow:disabled { opacity: 0.18; cursor: default; }

    /* ── save habit btn ── */
    .habit-save-row { height: var(--row-h); display: flex; align-items: center; padding-left: var(--right-date); }
    .habit-save-btn { border: none; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 6px; cursor: pointer; transition: opacity 0.15s; }
    .habit-save-btn:hover { opacity: 0.8; }
    .habit-save-btn:disabled { opacity: 0.45; }

    /* ── status ── */
    .book-status { font-size: 10px; color: #888; text-align: center; margin-top: 5px; min-height: 14px; }

    /* ── footer ── */
    .book-footer { text-align: right; font-size: 10px; color: #999; margin-top: 5px; padding-right: 4px; }

    /* ═══ MOBILE: 세로로 쌓기 ═══ */
    @media (max-width: 700px) {
      :root { --row-h: 24px; --left-date: 42px; --left-margin: 50px; --right-date: 40px; --right-margin: 48px; --total-w: 22px; }
      .book-spread { flex-direction: column; }
      .page-left  { padding: 0 10px 10px 12px; }
      .page-right { padding: 0 12px 10px 10px; }
      .spine { width: 100%; height: 12px; flex-direction: row; justify-content: space-around; align-items: center; padding: 0 8px; gap: 0; }
      .spine::before { top: 2px; bottom: 2px; left: 0; right: 0; background: repeating-linear-gradient(to right, transparent 0, transparent 10px, rgba(0,0,0,0.06) 10px, rgba(0,0,0,0.06) 11px); }
      .ring { width: 9px; height: 9px; }
    }
  </style>
</head>
<body>

<div class="book-outer">

  <!-- TOP BAR -->
  <div class="book-topbar">
    <div class="book-nav">
      <button class="icon-btn" id="prevBtn">‹</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="icon-btn" id="nextBtn">›</button>
    </div>
    <div class="user-block">
      <div class="user-name" id="userNameText">사용자</div>
      <div class="menu-wrap" id="menuWrap">
        <button class="menu-btn" id="menuBtn">⋯</button>
        <div class="menu-pop" id="menuPop">
          <button class="menu-item" id="logoutBtn">로그아웃</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <div class="guide">최초 1회만 입력하면 자동 로그인됩니다.</div>
    <div class="login-row">
      <input class="inp" id="loginName" type="text" placeholder="사용자 이름" maxlength="30" />
      <input class="inp" id="loginPass" type="password" placeholder="비밀번호" maxlength="30" />
      <button class="text-btn" id="startBtn">시작하기</button>
    </div>
    <div class="status-bar" id="loginStatus"></div>
  </div>

  <!-- BOOK SPREAD -->
  <div class="book-spread">

    <!-- ░░░ LEFT PAGE — Clonote 메모 ░░░ -->
    <div class="page-left" id="pageLeft">
      <div class="page-header">
        <div class="page-title">메모</div>
        <div class="tab-pills">
          <button class="tab-pill active" data-ltab="memo-month">월간</button>
          <button class="tab-pill" data-ltab="memo-week">주간</button>
        </div>
      </div>
      <div id="memoContent"></div>
    </div>

    <!-- ░░░ SPINE ░░░ -->
    <div class="spine" id="spineEl"></div>

    <!-- ░░░ RIGHT PAGE — 습관 체크 ░░░ -->
    <div class="page-right" id="pageRight">
      <div class="page-header">
        <div class="page-title">습관</div>
        <div class="tab-pills">
          <button class="tab-pill active" data-rtab="habit-home">홈</button>
          <button class="tab-pill" data-rtab="habit-setup">설정</button>
          <button class="tab-pill" data-rtab="habit-all">전체</button>
        </div>
      </div>
      <div id="habitContent"></div>
    </div>

  </div><!-- /book-spread -->

  <div class="book-status" id="statusText"></div>
  <div class="book-footer">© Clonote</div>
</div><!-- /book-outer -->

<script>
const API_URL      = 'https://script.google.com/macros/s/AKfycbyulVoUk60eCayQ5Y9QygtkTpxw2ilP_fcVUHuaI_2nktDPdoPxKXhSmt0ty6-JVTE4/exec';
const TOK_KEY      = 'clonote_token';
const USER_KEY     = 'clonote_user';
const CACHE_PFX    = 'clonote_c2';
const MAX_H        = 10;
const DEF_H        = 5;
const DEBOUNCE     = 650;

let curDate      = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let curUser      = null;
let curToken     = localStorage.getItem(TOK_KEY)||'';
let habits       = [];     // string[10]
let checks       = {};     // { day: bool[10] }
let memos        = {};     // { day: string }
let leftTab      = 'memo-month';
let rightTab     = 'habit-home';
let weekOff      = 0;
let memoTimers   = {};
let memoVers     = {};
let checkTimers  = {};

const $  = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

const yr   = () => curDate.getFullYear();
const mo   = () => curDate.getMonth()+1;
const ym   = () => yr()+'-'+String(mo()).padStart(2,'0');
const last = () => new Date(yr(), mo(), 0).getDate();
const dow  = d  => new Date(yr(), mo()-1, d).getDay();
const dcls = d  => { const w=dow(d); return w===6?'sat':w===0?'sun':''; };
const hcnt = () => Math.max(habits.filter(h=>h.trim()!=='').length, DEF_H);

function setStatus(m,e=false){ $('statusText').textContent=m||''; $('statusText').style.color=e?'#c0392b':'#888'; }
function setLS(m,e=false){ $('loginStatus').textContent=m||''; $('loginStatus').style.color=e?'#c0392b':'#666'; }

/* ── CACHE ── */
function ck(type){ return `${CACHE_PFX}:${curUser?.userId}:${ym()}:${type}`; }
function saveCache(){
  if(!curUser) return;
  try {
    localStorage.setItem(ck('h'), JSON.stringify(habits));
    localStorage.setItem(ck('c'), JSON.stringify(checks));
    localStorage.setItem(ck('m'), JSON.stringify(memos));
  } catch{}
}
function loadCache(){
  try {
    const h=localStorage.getItem(ck('h'));
    const c=localStorage.getItem(ck('c'));
    const m=localStorage.getItem(ck('m'));
    return { h:h?JSON.parse(h):null, c:c?JSON.parse(c):null, m:m?JSON.parse(m):null };
  } catch{ return {}; }
}

/* ── API ── */
const gj = url => fetch(url).then(r=>r.json());
const pj = body => fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)}).then(r=>r.json());

/* ── AUTH ── */
async function tryAutoLogin(){
  if(!curToken){ renderMeta(); return false; }
  try {
    const r = await gj(`${API_URL}?action=autoLogin&token=${encodeURIComponent(curToken)}`);
    if(r.success&&r.user){ curUser=r.user; localStorage.setItem(USER_KEY,JSON.stringify(curUser)); renderMeta(); return true; }
    clearAuth(); return false;
  } catch{ renderMeta(); return false; }
}
function clearAuth(){ localStorage.removeItem(TOK_KEY); localStorage.removeItem(USER_KEY); curToken=''; curUser=null; }

async function doStart(){
  const n=$('loginName').value.trim(), p=$('loginPass').value.trim();
  if(!n||!p){ setLS('이름과 비밀번호를 입력해 주세요.',true); return; }
  $('startBtn').disabled=true; setLS('확인 중...');
  try {
    await pj({action:'registerUser',userName:n,password:p});
    const r=await pj({action:'login',userName:n,password:p});
    if(!r.success||!r.token||!r.user) throw new Error(r.message||'로그인 실패');
    curToken=r.token; curUser=r.user;
    localStorage.setItem(TOK_KEY,curToken);
    localStorage.setItem(USER_KEY,JSON.stringify(curUser));
    $('loginName').value=''; $('loginPass').value=''; setLS('');
    renderMeta(); await loadAll();
  } catch(e){ setLS(e.message||'실패',true); }
  finally{ $('startBtn').disabled=false; }
}

async function doLogout(){
  try{ if(curToken) await pj({action:'logout',token:curToken}); } catch{}
  clearAuth(); habits=[]; checks={}; memos={};
  renderMeta(); renderAll(); setStatus('로그아웃되었습니다.');
}

function renderMeta(){
  $('monthTitle').textContent = yr()+'년 '+mo()+'월';
  $('userNameText').textContent = curUser?.userName||'사용자';
  $('loginBox').classList.toggle('show',!curUser);
  $('menuWrap').classList.toggle('show',!!curUser);
  if(!curUser) $('menuPop').classList.remove('show');
}

/* ── LOAD ── */
async function loadAll(){
  renderMeta();
  if(!curUser) return;

  // 캐시 즉시
  const cc=loadCache();
  if(cc.h) habits=cc.h;
  if(cc.c){ checks={}; Object.entries(cc.c).forEach(([d,v])=>{ checks[+d]=v; }); }
  if(cc.m){ memos={};  Object.entries(cc.m).forEach(([d,v])=>{ memos[+d]=v; }); }
  renderAll();

  try {
    const [hR,cR,mR] = await Promise.all([
      gj(`${API_URL}?action=getHabits&userId=${curUser.userId}&yearMonth=${ym()}`),
      gj(`${API_URL}?action=getChecks&userId=${curUser.userId}&yearMonth=${ym()}`),
      gj(`${API_URL}?action=getRecords&userId=${curUser.userId}&year=${yr()}&month=${mo()}`)
    ]);
    habits = (hR.success&&hR.habits) ? hR.habits : Array(MAX_H).fill('');
    checks = {};
    if(cR.success&&cR.checks) cR.checks.forEach(c=>{ checks[c.day]=c.checks; });
    memos  = {};
    if(mR.success&&mR.records) mR.records.forEach(r=>{ memos[r.day]=r.memo||''; });
    saveCache();
  } catch{ setStatus('데이터 로드 실패',true); return; }

  renderAll(); setStatus('');
}

/* ── RENDER ALL ── */
function renderAll(){ renderLeft(); renderRight(); buildSpine(); }

/* ══════════════════════════════
   LEFT PAGE — MEMO
══════════════════════════════ */
function renderLeft(){
  const el=$('memoContent');
  if(leftTab==='memo-month') el.innerHTML=buildMemoRows(1, last(), 'lm');
  else                        el.innerHTML=buildMemoWeek();
  bindMemo(el);
}

function buildMemoRows(from, to, src){
  let html='';
  for(let d=from;d<=to;d++){
    const cls=dcls(d); const memo=memos[d]||'';
    html+=`<div class="memo-row">
      <div class="day-cell ${cls}" style="width:var(--left-date);">${d}일</div>
      <div class="memo-cell">
        <input class="memo-input" id="mi-${src}-${d}" type="text" data-day="${d}" data-src="${src}"
          value="${esc(memo)}" ${curUser?'':'disabled'}/>
        <span class="save-ind" id="si-${src}-${d}"></span>
      </div>
    </div>`;
  }
  return html;
}

function buildMemoWeek(){
  const days=getWeekDays('left');
  if(!days.length) return '<div style="padding:8px 4px;font-size:11px;color:var(--muted);">해당 없음</div>';
  return buildMemoRows(days[0], days[days.length-1], 'lw');
}

function bindMemo(el){
  el.querySelectorAll('.memo-input').forEach(inp=>{
    inp.addEventListener('input',()=>scheduleMemo(+inp.dataset.day, inp.dataset.src));
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault(); flushMemo(+inp.dataset.day, inp.dataset.src);} });
    inp.addEventListener('blur',()=>flushMemo(+inp.dataset.day, inp.dataset.src));
  });
}

/* ══════════════════════════════
   RIGHT PAGE — HABITS
══════════════════════════════ */
function renderRight(){
  const el=$('habitContent');
  if(rightTab==='habit-home')  el.innerHTML=buildHabitHome();
  else if(rightTab==='habit-setup') el.innerHTML=buildHabitSetup();
  else                         el.innerHTML=buildHabitAll();
  bindChecks(el);
  if(rightTab==='habit-setup') bindSetup(el);
  if(rightTab==='habit-home')  renderGraph();
}

/* ── 홈: 그래프 + 주간 체크 ── */
function buildHabitHome(){
  const days=getWeekDays('right');
  const lastDay=last();
  const minD=days[0]||1, maxD=days[days.length-1]||lastDay;
  const prevDis=minD<=1?'disabled':'';
  const nextDis=maxD>=lastDay?'disabled':'';
  const lbl=days.length?`${days[0]}일 — ${days[days.length-1]}일`:'';

  let html=`<div class="graph-wrap"><canvas class="graph" id="graphCanvas"></canvas></div>`;
  html+=`<div class="week-nav">
    <button class="w-arrow" id="wPrev" ${prevDis}>‹</button>
    <div class="week-lbl">${lbl}</div>
    <button class="w-arrow" id="wNext" ${nextDis}>›</button>
  </div>`;
  if(days.length){
    html+=buildCheckHeader('rh');
    days.forEach(d=>{ html+=buildCheckRow(d,'rh'); });
  }
  return html;
}

/* ── 전체: 월간 체크 ── */
function buildHabitAll(){
  let html=buildCheckHeader('ra');
  for(let d=1;d<=last();d++) html+=buildCheckRow(d,'ra');
  return html;
}

/* ── 체크 헤더 ── */
function buildCheckHeader(src){
  const cnt=hcnt();
  const col=`var(--right-date) repeat(${cnt},1fr) var(--total-w)`;
  let cells='';
  habits.slice(0,cnt).forEach(n=>{ cells+=`<div class="hdr-cell" style="min-width:0;">${esc(n||'—')}</div>`; });
  return `<div class="habit-hdr" style="grid-template-columns:${col}; display:grid; align-items:center; height:var(--row-h);">
    <div style="width:var(--right-date); flex-shrink:0;"></div>${cells}
    <div class="hdr-total" style="width:var(--total-w);">합</div>
  </div>`;
}

/* ── 체크 행 ── */
function buildCheckRow(d, src){
  const cnt  = hcnt();
  const col  = `var(--right-date) repeat(${cnt},1fr) var(--total-w)`;
  const cls  = dcls(d);
  const ch   = checks[d]||Array(MAX_H).fill(false);
  const tot  = ch.slice(0,cnt).filter(Boolean).length;
  const dis  = curUser?'':'disabled';
  const DOW  = ['일','월','화','수','목','금','토'];
  const ds   = src==='rh'?`<span style="font-size:8px;font-weight:400;margin-left:1px;">${DOW[dow(d)]}</span>`:'';
  let cbs='';
  for(let i=0;i<cnt;i++){
    const chk=ch[i]?'checked':'';
    cbs+=`<div class="cb-wrap" style="min-width:0;"><input type="checkbox" data-day="${d}" data-idx="${i}" data-src="${src}" ${chk} ${dis}/></div>`;
  }
  return `<div class="check-row" style="grid-template-columns:${col}; display:grid; align-items:center; height:var(--row-h);">
    <div class="day-cell ${cls}" style="width:var(--right-date); flex-shrink:0;">${d}일${ds}</div>
    ${cbs}
    <div class="total-cell" id="tc-${src}-${d}" style="width:var(--total-w);">${tot>0?tot:''}</div>
  </div>`;
}

/* ── 습관 설정 ── */
function buildHabitSetup(){
  let html='';
  for(let i=0;i<MAX_H;i++){
    const v=esc(habits[i]||'');
    const ph=i<DEF_H?`습관 ${i+1}`:`습관 ${i+1} (선택)`;
    const dis=curUser?'':'disabled';
    html+=`<div class="setup-row">
      <div class="setup-num">${i+1}</div>
      <div class="setup-inp-wrap">
        <input class="setup-inp" type="text" data-hi="${i}" value="${v}" placeholder="${ph}" maxlength="20" ${dis}/>
      </div>
    </div>`;
  }
  html+=`<div class="habit-save-row"><button class="habit-save-btn" id="habitSaveBtn">저장</button></div>`;
  return html;
}

function bindSetup(el){
  const btn=el.querySelector('#habitSaveBtn');
  if(btn) btn.addEventListener('click', doSaveHabits);
}

async function doSaveHabits(){
  if(!curUser) return;
  const inputs=document.querySelectorAll('.setup-inp');
  const h=Array.from(inputs).map(i=>i.value.trim());
  const btn=document.getElementById('habitSaveBtn');
  if(btn) btn.disabled=true;
  setStatus('저장 중...');
  try {
    const r=await pj({action:'saveHabits',userId:curUser.userId,yearMonth:ym(),habits:h});
    if(!r.success) throw new Error(r.message);
    habits=r.habits; saveCache();
    // 저장 완료 후 홈 탭으로 이동
    rightTab='habit-home';
    document.querySelectorAll('[data-rtab]').forEach(x=>x.classList.toggle('active', x.dataset.rtab==='habit-home'));
    renderRight();
    renderLeft();
    buildSpine();
    setStatus('습관이 저장되었습니다.');
    setTimeout(()=>setStatus(''),2000);
  } catch(e){
    setStatus(e.message||'저장 실패',true);
    if(btn) btn.disabled=false;
  }
}

/* ── 체크 이벤트 바인딩 ── */
function bindChecks(el){
  el.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.addEventListener('change',onCheck));
  // 주간 화살표
  const wp=el.querySelector('#wPrev'), wn=el.querySelector('#wNext');
  if(wp) wp.addEventListener('click',()=>{ weekOff--; renderRight(); });
  if(wn) wn.addEventListener('click',()=>{ weekOff++; renderRight(); });
}

function onCheck(e){
  if(!curUser) return;
  const d=+e.target.dataset.day, idx=+e.target.dataset.idx;
  const cnt=hcnt();
  const prev=checks[d]?[...checks[d]]:Array(MAX_H).fill(false);
  prev[idx]=e.target.checked;
  checks[d]=prev;
  const tot=prev.slice(0,cnt).filter(Boolean).length;

  // 같은 날짜 다른 src 체크박스 동기화
  document.querySelectorAll(`input[type="checkbox"][data-day="${d}"][data-idx="${idx}"]`).forEach(cb=>{
    if(cb!==e.target) cb.checked=e.target.checked;
  });
  // total 동기화
  document.querySelectorAll(`[id^="tc-"][id$="-${d}"]`).forEach(el=>{ el.textContent=tot>0?tot:''; });

  saveCache();
  if(rightTab==='habit-home') renderGraph();

  // 디바운스: 연속 체크해도 마지막 상태 1번만 저장
  clearTimeout(checkTimers[d]);
  checkTimers[d] = setTimeout(async () => {
    try {
      const r = await pj({
        action: 'saveCheck',
        userId: curUser.userId,
        yearMonth: ym(),
        day: d,
        checks: checks[d]
      });
      if (!r.success) setStatus('체크 저장 실패: ' + (r.message||''), true);
    } catch(err) {
      setStatus('체크 저장 오류: ' + (err.message||''), true);
    }
  }, 800);
}

/* ══════════════════════════════
   MEMO SAVE
══════════════════════════════ */
function scheduleMemo(d, src){
  if(!curUser) return;
  clearTimeout(memoTimers[d]);
  showInd(d,src,'저장중',true);
  memoTimers[d]=setTimeout(()=>flushMemo(d,src), DEBOUNCE);
}
function flushMemo(d, src){
  if(!curUser) return;
  clearTimeout(memoTimers[d]);
  doMemoSave(d, src);
}

async function doMemoSave(d, src){
  const inp=document.getElementById(`mi-${src}-${d}`);
  if(!inp) return;
  const val=inp.value.trim();

  // 반대쪽 시트도 동기화
  const otherSrc=src==='lm'?'lw':'lm';
  const twin=document.getElementById(`mi-${otherSrc}-${d}`);
  if(twin&&twin.value!==inp.value) twin.value=inp.value;

  if(!val){ showInd(d,src,'',false); showInd(d,otherSrc,'',false); memos[d]=''; saveCache(); return; }
  if(val===(memos[d]||'')){ showInd(d,src,'',false); return; }

  const ver=(memoVers[d]||0)+1; memoVers[d]=ver;
  try {
    const r=await pj({action:'saveRecord',userId:curUser.userId,year:yr(),month:mo(),day:d,memo:val});
    if(memoVers[d]!==ver) return;
    if(!r.success) throw new Error(r.message);
    memos[d]=val; saveCache();
    showInd(d,src,'',false); showInd(d,otherSrc,'',false);
    setStatus(`${d}일 메모 저장`); setTimeout(()=>setStatus(''),1500);
  } catch(err){
    if(memoVers[d]!==ver) return;
    showInd(d,src,'오류',true);
    setStatus(err.message||'메모 저장 오류',true);
  }
}

function showInd(d, src, txt, show){
  const el=document.getElementById(`si-${src}-${d}`);
  if(!el) return;
  el.textContent=txt; el.classList.toggle('show',show&&!!txt);
}

/* ══════════════════════════════
   GRAPH
══════════════════════════════ */
function renderGraph(){
  const cv=document.getElementById('graphCanvas');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  const ld=last(), cnt=hcnt();
  const now=new Date();
  const isCur=(yr()===now.getFullYear()&&mo()===now.getMonth()+1);
  const today=isCur?now.getDate():ld;

  const data=[];
  for(let d=1;d<=ld;d++){
    const c=checks[d]||[];
    data.push(c.slice(0,cnt).filter(Boolean).length);
  }
  const hasAny=data.some(v=>v>0);

  const dpr=window.devicePixelRatio||1;
  // 부모 너비를 읽되, canvas 자신의 크기는 style로 명시적으로 고정
  const W=cv.parentElement.clientWidth||320;
  const H=130;
  cv.style.width  = W+'px';
  cv.style.height = H+'px';
  cv.width  = W*dpr;
  cv.height = H*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const p={t:12,r:14,b:22,l:22};
  const gW=W-p.l-p.r, gH=H-p.t-p.b;

  // 격자
  ctx.strokeStyle='rgba(132,184,196,0.25)'; ctx.lineWidth=0.5;
  for(let v=0;v<=cnt;v++){
    const y=p.t+gH-(v/cnt)*gH;
    ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(p.l+gW,y); ctx.stroke();
    if(v>0){ ctx.fillStyle='rgba(100,100,100,0.4)'; ctx.font='8px Arial'; ctx.textAlign='right'; ctx.fillText(v,p.l-3,y+3); }
  }
  // X 레이블
  ctx.fillStyle='rgba(100,100,100,0.45)'; ctx.font='8px Arial'; ctx.textAlign='center';
  for(let d=1;d<=ld;d++){
    if(d===1||d%5===0||d===ld){
      const x=p.l+((d-1)/(ld-1))*gW;
      ctx.fillText(d, x, H-p.b+10);
    }
  }

  if(!hasAny) return;

  const pts=[];
  for(let d=1;d<=today;d++){
    const x=p.l+((d-1)/(ld-1))*gW;
    const y=p.t+gH-(data[d-1]/cnt)*gH;
    pts.push({x,y,v:data[d-1]});
  }
  if(!pts.length) return;

  // 면
  ctx.beginPath(); ctx.moveTo(pts[0].x,p.t+gH);
  pts.forEach(pt=>ctx.lineTo(pt.x,pt.y));
  ctx.lineTo(pts[pts.length-1].x,p.t+gH);
  ctx.closePath(); ctx.fillStyle='rgba(93,134,200,0.09)'; ctx.fill();

  // 선
  ctx.beginPath(); ctx.strokeStyle='rgba(93,134,200,0.8)'; ctx.lineWidth=1.6; ctx.lineJoin='round';
  pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y)); ctx.stroke();

  // 점
  pts.forEach(pt=>{
    ctx.beginPath(); ctx.arc(pt.x,pt.y,2,0,Math.PI*2);
    ctx.fillStyle=pt.v>0?'rgba(93,134,200,0.85)':'rgba(190,190,190,0.5)'; ctx.fill();
  });
}

/* ══════════════════════════════
   WEEK DAYS
══════════════════════════════ */
function getWeekDays(side){
  const today=new Date();
  const isCur=(yr()===today.getFullYear()&&mo()===today.getMonth()+1);
  const base=isCur?today.getDate():last();
  const bd=new Date(yr(),mo()-1,base);
  const dw=bd.getDay();
  const monday=new Date(bd);
  monday.setDate(bd.getDate()-(dw===0?6:dw-1)+weekOff*7);
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    if(d.getFullYear()===yr()&&d.getMonth()+1===mo()) days.push(d.getDate());
  }
  return days;
}

/* ══════════════════════════════
   SPINE RINGS
══════════════════════════════ */
function buildSpine(){
  const sp=$('spineEl');
  const rows=Math.ceil(last()*1.4);
  let html='';
  for(let i=0;i<Math.min(rows,24);i++) html+=`<div class="ring"></div>`;
  sp.innerHTML=html;
}

/* ══════════════════════════════
   MONTH NAV
══════════════════════════════ */
function moveMonth(off){
  curDate=new Date(yr(),mo()-1+off,1);
  weekOff=0; habits=[]; checks={}; memos={};
  renderAll(); loadAll();
}

   EVENTS
══════════════════════════════ */
$('prevBtn').addEventListener('click',()=>moveMonth(-1));
$('nextBtn').addEventListener('click',()=>moveMonth(1));
$('startBtn').addEventListener('click',doStart);
$('logoutBtn').addEventListener('click',doLogout);
$('loginName').addEventListener('keydown',e=>{ if(e.key==='Enter') doStart(); });
$('loginPass').addEventListener('keydown',e=>{ if(e.key==='Enter') doStart(); });
$('menuBtn').addEventListener('click',()=>$('menuPop').classList.toggle('show'));
document.addEventListener('click',e=>{ if(!$('menuWrap').contains(e.target)) $('menuPop').classList.remove('show'); });

// 왼쪽 탭
document.querySelectorAll('[data-ltab]').forEach(b=>b.addEventListener('click',()=>{
  leftTab=b.dataset.ltab;
  document.querySelectorAll('[data-ltab]').forEach(x=>x.classList.toggle('active',x===b));
  renderLeft();
}));

// 오른쪽 탭
document.querySelectorAll('[data-rtab]').forEach(b=>b.addEventListener('click',()=>{
  rightTab=b.dataset.rtab;
  document.querySelectorAll('[data-rtab]').forEach(x=>x.classList.toggle('active',x===b));
  renderRight();
}));

window.addEventListener('resize',()=>{ if(rightTab==='habit-home') renderGraph(); });

/* ══════════════════════════════
   INIT
══════════════════════════════ */
async function init(){
  renderMeta(); buildSpine(); renderAll();
  const cachedUser=(()=>{ try{ const r=localStorage.getItem(USER_KEY); return r?JSON.parse(r):null; }catch{return null;} })();
  if(curToken&&cachedUser){
    curUser=cachedUser; renderMeta(); await loadAll();
    const ok=await tryAutoLogin();
    if(!ok){ clearAuth(); renderMeta(); renderAll(); setStatus('로그인이 만료되었습니다.',true); }
    else await loadAll();
    return;
  }
  const ok=await tryAutoLogin();
  if(ok) await loadAll();
}

init();
