<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>馬시멜로</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #e91e8c;
      --pink-deep: #c2185b;
      --pink-soft: #f48fb1;
      --pink-pale: #fff0f7;
      --pink-border: #fcd4e8;
      --text: #2d1020;
      --text-sub: #a0527a;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: transparent;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 400px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    #content {
      min-height: 120px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      animation: up 0.6s ease both;
    }

    .section-header .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--pink-soft), transparent);
    }

    .section-header .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--pink);
      text-transform: uppercase;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(145deg, #ffffff 0%, #fdf4f9 60%, #fce8f3 100%);
      border: 1px solid #fad6ea;
      border-radius: 22px;
      padding: 15px 18px;
      text-decoration: none;
      color: inherit;
      box-shadow:
        0 2px 0 #f2c4db,
        0 6px 20px #e91e8c0e,
        inset 0 1px 0 rgba(255,255,255,0.95);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: up 0.6s ease both;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow:
        0 4px 0 #f2c4db,
        0 12px 28px #e91e8c1a,
        inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .card:active { transform: scale(0.98); }

    .card-thumb,
    .card-fallback {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      flex-shrink: 0;
      object-fit: cover;
      background: white;
      border: 1px solid #f3d3e3;
    }

    .icon-insta {
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    .icon-app {
      background: linear-gradient(135deg, #f8b4d0, #e91e8c);
    }

    .card-text {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .card-sub {
      font-size: 12px;
      color: var(--text-sub);
    }

    .card-title-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .card-cta {
      font-size: 11px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 24px;
      flex-shrink: 0;
      color: white;
      background: linear-gradient(135deg, #f48fb1, #e91e8c);
      border: none;
      letter-spacing: 0.5px;
    }

    .gap { margin-top: 20px; }

    .error-box {
      background: #fff0f0;
      border: 1px solid #ffcdd2;
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      color: #c62828;
      text-align: center;
      line-height: 1.6;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .admin-btn {
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 38px;
      height: 24px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(252, 212, 232, 0.9);
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(233, 30, 140, 0.08);
      backdrop-filter: blur(6px);
      opacity: 0.55;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .admin-btn:hover {
      opacity: 1;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(233, 30, 140, 0.16);
    }

    .admin-btn span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #a0527a;
      display: block;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45, 16, 32, 0.45);
      backdrop-filter: blur(5px);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .sheet {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 -8px 40px #e91e8c22;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: #fcd4e8;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .sheet-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
    }

    .sheet-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--text-sub);
    }

    .pw-wrap { text-align: center; }

    .pw-wrap p {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 14px;
    }

    .pw-input {
      width: 100%;
      border: 1.5px solid var(--pink-border);
      border-radius: 12px;
      padding: 12px;
      font-size: 18px;
      text-align: center;
      letter-spacing: 6px;
      font-family: inherit;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .pw-input:focus { border-color: var(--pink); }

    .pw-err {
      font-size: 12px;
      color: var(--pink);
      display: none;
      margin-bottom: 10px;
    }

    .sec-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--pink);
      margin: 16px 0 10px;
    }

    .field { margin-bottom: 10px; }

    .field label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      border: 1.5px solid var(--pink-border);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--pink); }

    .field-group {
      background: var(--pink-pale);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .preview-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .preview-thumb {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--pink-border);
      background: white;
      display: none;
    }

    .preview-text {
      font-size: 12px;
      color: var(--text-sub);
      word-break: break-all;
    }

    .hr {
      border: none;
      border-top: 1px dashed var(--pink-border);
      margin: 16px 0;
    }

    .save-btn {
      width: 100%;
      background: linear-gradient(135deg, #e91e8c, #c2185b);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
    }

    .save-btn:hover { opacity: 0.88; }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .mini-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border: 1px solid var(--pink-border);
      border-radius: 12px;
      background: #fff8fc;
      color: var(--pink-deep);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .remove-btn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #ffe8f1;
      color: #b0004f;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="content"></div>
  </div>

  <button class="admin-btn" onclick="openOverlay()" title="관리자" aria-label="관리자">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="overlay" id="overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <button class="sheet-close" onclick="closeOverlay()">✕</button>

      <div id="pw-view">
        <div class="sheet-title">관리자 모드</div>
        <div class="pw-wrap">
          <p>비밀번호를 입력하세요</p>
          <input
            class="pw-input"
            type="password"
            id="pw-input"
            maxlength="20"
            placeholder="••••"
            onkeydown="if(event.key==='Enter')checkPw()"
          />
          <div class="pw-err" id="pw-err">비밀번호가 틀렸습니다</div>
          <button class="save-btn" onclick="checkPw()">확인</button>
        </div>
      </div>

      <div id="admin-view" style="display:none">
        <div class="sheet-title">링크 편집</div>

        <div class="sec-label">인스타그램</div>
        <div id="admin-insta"></div>
        <button class="mini-btn" type="button" onclick="addItem('insta')">인스타 계정 추가</button>

        <hr class="hr" />

        <div class="sec-label">앱 다운로드</div>
        <div id="admin-app"></div>
        <button class="mini-btn" type="button" onclick="addItem('app')">앱 항목 추가</button>

        <button class="save-btn" id="save-btn" onclick="saveAll()">저장하기</button>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PW = '1234';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx8iWM0Q32qFqGiNoMDLoTOJRV2gamHEdcan0OdTHZ-4Bkjf44s_CG4ha-cv0EHUw5D/exec';

    const DEFAULT = [
      {
        type: 'insta',
        name: '맘맘',
        sub: '@mom_mom.ins',
        url: 'https://www.instagram.com/mom_mom.ins',
        image: ''
      },
      {
        type: 'insta',
        name: '월리플랍',
        sub: '@wallytrp',
        url: 'https://www.instagram.com/wallytrp',
        image: ''
      },
      {
        type: 'insta',
        name: '말타',
        sub: '@malta_luxspo',
        url: 'https://www.instagram.com/malta_luxspo',
        image: ''
      },
      {
        type: 'app',
        name: '맘맘 앱',
        sub: '앱 다운로드',
        url: 'https://mommom.onelink.me/oQHz/9d6j1i9x',
        image: ''
      },
      {
        type: 'app',
        name: '말타 앱',
        sub: '앱 다운로드',
        url: 'https://luxspomalta.page.link/V9Hh',
        image: ''
      }
    ];

    let currentData = [];

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function uid() {
      return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
    }

    function openOverlay() {
      document.getElementById('overlay').classList.add('open');
      document.getElementById('pw-view').style.display = 'block';
      document.getElementById('admin-view').style.display = 'none';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-err').style.display = 'none';
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('open');
    }

    document.getElementById('overlay').addEventListener('click', function (e) {
      if (e.target === this) closeOverlay();
    });

    function checkPw() {
      if (document.getElementById('pw-input').value === ADMIN_PW) {
        document.getElementById('pw-view').style.display = 'none';
        document.getElementById('admin-view').style.display = 'block';
        buildAdminForm();
      } else {
        document.getElementById('pw-err').style.display = 'block';
      }
    }

    async function loadData() {
      try {
        const res = await fetch(GAS_URL);
        const text = await res.text();
        const json = JSON.parse(text);

        if (json.ok && Array.isArray(json.data)) {
          currentData = json.data;
        } else {
          currentData = DEFAULT;
        }

        renderCards(currentData);
      } catch (e) {
        console.error(e);
        currentData = DEFAULT;
        renderCards(currentData);
      }
    }

    function renderCards(items) {
      const insta = items.filter(x => x.type === 'insta');
      const app = items.filter(x => x.type === 'app');

      let html = '';

      if (insta.length) {
        html += `
          <div class="section-header" style="animation-delay:.1s">
            <span class="label">인스타그램 팔로우</span>
            <div class="line"></div>
          </div>
          <div class="cards">
        `;

        insta.forEach((item, i) => {
          html += `
            <a class="card" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener"
              style="animation-delay:${0.15 + i * 0.06}s">
              ${
                item.image
                  ? `<img class="card-thumb" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name || '')}">`
                  : `<div class="card-fallback icon-insta"></div>`
              }
              <div class="card-text">
                <div class="card-title-row">
                  <span class="card-name">${escapeHtml(item.name || '')}</span>
                  <span class="card-sub">${escapeHtml(item.sub || '')}</span>
                </div>
              </div>
              <span class="card-cta">팔로우</span>
            </a>
          `;
        });

        html += `</div>`;
      }

      if (app.length) {
        html += `
          <div class="section-header gap" style="animation-delay:.3s">
            <span class="label">앱 다운로드</span>
            <div class="line"></div>
          </div>
          <div class="cards">
        `;

        app.forEach((item, i) => {
          html += `
            <a class="card" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener"
              style="animation-delay:${0.35 + i * 0.06}s">
              ${
                item.image
                  ? `<img class="card-thumb" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name || '')}">`
                  : `<div class="card-fallback icon-app"></div>`
              }
              <div class="card-text">
                <div class="card-title-row">
                  <span class="card-name">${escapeHtml(item.name || '')}</span>
                  <span class="card-sub">${escapeHtml(item.sub || '')}</span>
                </div>
              </div>
              <span class="card-cta">다운로드</span>
            </a>
          `;
        });

        html += `</div>`;
      }

      document.getElementById('content').innerHTML = html || `
        <div class="error-box">표시할 링크가 없습니다.</div>
      `;
    }

    function buildAdminForm() {
      const items = currentData.length ? currentData : DEFAULT;
      const insta = items.filter(x => x.type === 'insta');
      const app = items.filter(x => x.type === 'app');

      document.getElementById('admin-insta').innerHTML = insta.map(item => adminItemTemplate(item)).join('');
      document.getElementById('admin-app').innerHTML = app.map(item => adminItemTemplate(item)).join('');
    }

    function adminItemTemplate(item) {
      const id = item.id || uid();
      const titleLabel = item.type === 'insta' ? '이름' : '앱 이름';
      const subLabel = item.type === 'insta' ? '핸들 (@ 포함)' : '설명';
      const hasImage = !!item.image;

      return `
        <div class="field-group" data-id="${escapeHtml(id)}" data-type="${escapeHtml(item.type)}" data-image="${escapeHtml(item.image || '')}">
          <div class="field">
            <label>${titleLabel}</label>
            <input class="f-name" value="${escapeHtml(item.name || '')}" />
          </div>

          <div class="field">
            <label>${subLabel}</label>
            <input class="f-sub" value="${escapeHtml(item.sub || '')}" />
          </div>

          <div class="field">
            <label>URL</label>
            <input class="f-url" value="${escapeHtml(item.url || '')}" />
          </div>

          <div class="field">
            <label>이미지 파일</label>
            <input class="f-file" type="file" accept="image/*" onchange="handleImagePreview(this)" />
            <div class="preview-wrap">
              <img class="preview-thumb" src="${escapeHtml(item.image || '')}" style="${hasImage ? 'display:block' : 'display:none'}" />
              <div class="preview-text">${hasImage ? '기존 이미지가 저장되어 있어요' : '선택된 이미지 없음'}</div>
            </div>
          </div>

          <button type="button" class="remove-btn" onclick="removeItem(this)">삭제</button>
        </div>
      `;
    }

    function addItem(type) {
      const target = document.getElementById(type === 'insta' ? 'admin-insta' : 'admin-app');

      target.insertAdjacentHTML('beforeend', adminItemTemplate({
        type,
        name: '',
        sub: type === 'insta' ? '@account' : '앱 다운로드',
        url: '',
        image: ''
      }));
    }

    function removeItem(button) {
      const group = button.closest('.field-group');
      if (group) group.remove();
    }

    function handleImagePreview(input) {
      const file = input.files[0];
      const group = input.closest('.field-group');
      const preview = group.querySelector('.preview-thumb');
      const text = group.querySelector('.preview-text');

      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        preview.src = e.target.result;
        preview.style.display = 'block';
        text.textContent = file.name;
      };
      reader.readAsDataURL(file);
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          const base64 = result.split(',')[1] || '';
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function collectItemsFromForm() {
      const groups = [
        ...document.querySelectorAll('#admin-insta .field-group'),
        ...document.querySelectorAll('#admin-app .field-group')
      ];

      const items = [];

      for (const el of groups) {
        const fileInput = el.querySelector('.f-file');
        const file = fileInput.files[0];

        let imageFile = null;

        if (file) {
          imageFile = {
            base64: await fileToBase64(file),
            mimeType: file.type || 'image/png',
            fileName: file.name || 'image.png'
          };
        }

        items.push({
          type: el.dataset.type,
          name: el.querySelector('.f-name').value.trim(),
          sub: el.querySelector('.f-sub').value.trim(),
          url: el.querySelector('.f-url').value.trim(),
          existingImage: el.dataset.image || '',
          imageFile: imageFile
        });
      }

      return items;
    }

    async function saveAll() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = '저장 중...';

      try {
        const items = await collectItemsFromForm();

        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            action: 'save',
            items: items
          })
        });

        const text = await res.text();
        const json = JSON.parse(text);

        if (!json.ok) {
          throw new Error(json.message || '저장 실패');
        }

        currentData = Array.isArray(json.data) ? json.data : [];
        renderCards(currentData);
        closeOverlay();
        alert('저장됐어요.');
      } catch (e) {
        console.error(e);
        alert('저장 실패: ' + (e.message || '알 수 없는 오류'));
      } finally {
        btn.disabled = false;
        btn.textContent = '저장하기';
      }
    }

    loadData();
  </script>
</body>
</html>
