<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어항</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Gowun+Dodum&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --sand:#ddd4b8; --sand-dark:#c4b898; }

  html, body {
    width:100%; height:100%;
    background:transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Gowun Dodum',sans-serif;
    overflow:hidden;
  }

  .tank-wrap { position:relative; width:100%; height:100vh; }

  .tank {
    position:relative; width:100%; height:100%;
    background:linear-gradient(180deg,#c8e8f4 0%,#aed4ec 60%,#88bedd 100%);
    overflow:hidden;
  }
  .tank::before {
    content:''; position:absolute; top:0; left:12px; width:28px; height:100%;
    background:linear-gradient(90deg,rgba(255,255,255,0.22),transparent);
    pointer-events:none; z-index:10;
  }
  .surface { position:absolute; top:0; left:0; right:0; height:20px; background:rgba(255,255,255,0.2); pointer-events:none; z-index:8; }
  .sand { position:absolute; bottom:0; left:0; right:0; height:60px; background:linear-gradient(180deg,var(--sand) 0%,var(--sand-dark) 100%); pointer-events:none; z-index:8; }
  .sand::before { content:''; position:absolute; top:0; left:0; right:0; height:8px; background:radial-gradient(ellipse 50% 100% at 25% 50%,rgba(255,255,255,0.25),transparent),radial-gradient(ellipse 40% 100% at 72% 50%,rgba(255,255,255,0.18),transparent); }
  .plants { position:absolute; bottom:52px; left:0; right:0; pointer-events:none; z-index:7; }

  .bubble { position:absolute; border-radius:50%; background:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.65); pointer-events:none; z-index:4; animation:riseUp linear forwards; }
  @keyframes riseUp {
    0%   { opacity:.7; transform:translateY(0) translateX(0); }
    50%  { transform:translateY(-45vh) translateX(6px); }
    100% { opacity:0; transform:translateY(-90vh) translateX(-4px); }
  }

  #fishCanvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:3; }
  #rodCanvas  { position:absolute; top:0; left:0; width:100%; height:100%; z-index:9; pointer-events:none; opacity:0; transition:opacity .35s; }
  #rodCanvas.visible { opacity:1; }

  .bottom-ui {
    position:absolute; bottom:16px; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; z-index:15;
  }
  .legend { display:flex; gap:12px; font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,0.75); }
  .legend-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }

  .fish-btn {
    font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.08em;
    color:#555; background:rgba(255,255,255,0.92); border:.5px solid rgba(0,0,0,.12);
    border-radius:20px; padding:7px 18px; cursor:pointer;
    transition:background .15s,transform .1s; backdrop-filter:blur(4px);
  }
  .fish-btn:hover  { background:white; }
  .fish-btn:active { transform:scale(.97); }
  .fish-btn:disabled { opacity:.5; cursor:default; transform:none; }

  .winner-overlay { position:absolute; inset:0; background:rgba(0,0,0,.2); display:flex; align-items:center; justify-content:center; z-index:20; pointer-events:none; opacity:0; transition:opacity .4s; }
  .winner-overlay.show { opacity:1; pointer-events:auto; }
  .winner-card { background:white; border-radius:16px; border:.5px solid rgba(0,0,0,.08); padding:32px 44px; text-align:center; cursor:pointer; min-width:240px; }
  .winner-label    { font-family:'DM Mono',monospace; font-size:10px; color:#bbb; letter-spacing:.14em; text-transform:uppercase; margin-bottom:8px; }
  .winner-channel  { font-family:'DM Mono',monospace; font-size:11px; color:#888; margin-bottom:10px; }
  .winner-name     { font-size:28px; font-weight:400; color:#1a1a1a; margin-bottom:6px; }
  .winner-template { font-family:'DM Mono',monospace; font-size:11px; color:#7b3fa0; background:#f3e8ff; border-radius:6px; padding:4px 12px; display:none; margin-bottom:20px; }
  .winner-close    { font-family:'DM Mono',monospace; font-size:10px; color:#ccc; letter-spacing:.1em; }
</style>
</head>
<body>

<div class="tank-wrap">
  <div class="tank" id="tank">
    <div class="surface"></div>
    <canvas id="fishCanvas"></canvas>
    <canvas id="rodCanvas"></canvas>

    <div class="plants" id="plants"></div>
    <div class="sand"></div>

    <div class="winner-overlay" id="winnerOverlay">
      <div class="winner-card">
        <div class="winner-label">이번 주 당첨자</div>
        <div class="winner-channel" id="winnerChannel"></div>
        <div class="winner-name" id="winnerName"></div>
        <div class="winner-template" id="winnerTemplate"></div>
        <div class="winner-close">click to continue</div>
      </div>
    </div>
  </div>

  <div class="bottom-ui">
    <div class="legend">
      <span><span class="legend-dot" style="background:#e8453c"></span>YouTube</span>
      <span><span class="legend-dot" style="background:#c2185b"></span>Instagram</span>
    </div>
    <button class="fish-btn" id="fishBtn">🎣 낚시하기</button>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwPjmU8xJs014Cv7KvyIwSB4nYOYbBoV2rpYy_i9XrUGnLFXV9LeunVA5AR1EAXqcLG/exec';
const POLL_INTERVAL = 5000; // 5초마다 폴링

const tankEl    = document.getElementById('tank');
const canvas    = document.getElementById('fishCanvas');
const rodCanvas = document.getElementById('rodCanvas');
const ctx       = canvas.getContext('2d');
const rctx      = rodCanvas.getContext('2d');
const SAND_H=60, TOP_H=20;
let W, H;

function resize(){
  W=tankEl.offsetWidth; H=tankEl.offsetHeight;
  canvas.width=W; canvas.height=H;
  rodCanvas.width=W; rodCanvas.height=H;
  buildPlants();
}

// ── 물풀 동적 생성 ───────────────────────────────────────
function buildPlants(){
  const container = document.getElementById('plants');
  const count = Math.floor(W / 180) + 2;
  const positions = [0.06, 0.5, 0.94];
  let svg = `<svg width="100%" height="100" viewBox="0 0 ${W} 100" xmlns="http://www.w3.org/2000/svg">`;
  positions.forEach(p => {
    const x = W * p;
    svg += `<path d="M${x} 100 Q${x-6} 65 ${x-14} 35 Q${x-20} 15 ${x-12} 4" stroke="#5a9a68" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
    svg += `<path d="M${x} 100 Q${x+6} 62 ${x+14} 33 Q${x+20} 12 ${x+10} 3" stroke="#4a8a58" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;
    svg += `<ellipse cx="${x-12}" cy="4" rx="9" ry="5" fill="#6ab078" transform="rotate(-22,${x-12},4)"/>`;
    svg += `<ellipse cx="${x+10}" cy="3" rx="8" ry="4.5" fill="#5aa068" transform="rotate(16,${x+10},3)"/>`;
  });
  svg += '</svg>';
  container.innerHTML = svg;
}

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

// ── 무지개 팔레트 (채널 구분 없이 랜덤) ─────────────────
const RAINBOW_PALETTES = [
  { body:'hsl(4,80%,58%)',   fin:'hsl(4,80%,36%)',   belly:'hsl(4,60%,78%)'   }, // 빨강
  { body:'hsl(25,85%,58%)',  fin:'hsl(25,85%,36%)',  belly:'hsl(25,65%,78%)'  }, // 주황
  { body:'hsl(48,88%,55%)',  fin:'hsl(48,88%,33%)',  belly:'hsl(48,70%,76%)'  }, // 노랑
  { body:'hsl(130,55%,50%)', fin:'hsl(130,55%,30%)', belly:'hsl(130,40%,74%)' }, // 초록
  { body:'hsl(210,72%,55%)', fin:'hsl(210,72%,33%)', belly:'hsl(210,55%,76%)' }, // 파랑
  { body:'hsl(270,55%,55%)', fin:'hsl(270,55%,33%)', belly:'hsl(270,38%,75%)' }, // 보라
];

// ── Fish 클래스 ──────────────────────────────────────────
class Fish {
  constructor(sub){
    this.sub=sub; this.size=46+Math.random()*26; this.isYT=sub.channel==='youtube';
    this.tailPhase=Math.random()*Math.PI*2;
    this.swayPhase=Math.random()*Math.PI*2;
    this.tagPhase=Math.random()*Math.PI*2;
    const p = RAINBOW_PALETTES[Math.floor(Math.random()*RAINBOW_PALETTES.length)];
    this.bodyCol=p.body; this.finCol=p.fin; this.bellyCol=p.belly;
    this.place();
  }
  place(){
    const minY=TOP_H+14, maxY=H-SAND_H-this.size*0.6-30;
    this.x=60+Math.random()*Math.max(10,W-120-this.size);
    this.y=minY+Math.random()*Math.max(10,maxY-minY);
    const spd=0.15+Math.random()*0.2, ang=(Math.random()-0.5)*0.4, dir=Math.random()>.5?1:-1;
    this.vx=dir*spd*Math.cos(ang); this.vy=spd*Math.sin(ang)*0.3;
    this.facingRight=this.vx>0;
  }
  update(frozen){
    if(frozen) return;
    this.tailPhase+=0.13; this.swayPhase+=0.04+Math.random()*0.01; this.tagPhase+=0.025+Math.random()*0.01;
    this.vx+=(Math.random()-0.5)*0.01; this.vy+=(Math.random()-0.5)*0.007;
    const spd=Math.hypot(this.vx,this.vy);
    if(spd>0.38){this.vx*=0.38/spd; this.vy*=0.38/spd;}
    if(spd<0.08&&spd>0){this.vx*=0.08/spd; this.vy*=0.08/spd;}
    const minY=TOP_H+10, maxY=H-SAND_H-this.size*0.6-12, mg=40;
    if(this.x<mg)            { this.vx= Math.abs(this.vx)+0.12; }
    if(this.x>W-mg-this.size){ this.vx=-Math.abs(this.vx)-0.12; }
    if(this.y<minY){ this.vy= Math.abs(this.vy)*0.7; this.y=minY; }
    if(this.y>maxY){ this.vy=-Math.abs(this.vy)*0.7; this.y=maxY; }
    if(Math.abs(this.vx)>0.1) this.facingRight=this.vx>0;
    this.x+=this.vx; this.y+=this.vy;
  }
  draw(ctx, isHooked){
    const s=this.size, bh=s*0.55, cx=this.x+s/2, cy=this.y+bh/2;
    ctx.save();
    ctx.translate(cx,cy);
    if(this.facingRight) ctx.scale(-1,1);
    ctx.rotate(Math.sin(this.swayPhase)*0.05);
    if(isHooked){ ctx.shadowColor='rgba(255,200,0,.8)'; ctx.shadowBlur=16; }

    // 꼬리
    const tw=Math.sin(this.tailPhase)*0.3;
    ctx.save(); ctx.translate(s*0.33,0); ctx.rotate(tw);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(s*0.32,-bh*0.44); ctx.lineTo(s*0.26,0); ctx.lineTo(s*0.32,bh*0.44); ctx.closePath();
    ctx.fillStyle=this.finCol; ctx.globalAlpha=0.9; ctx.fill(); ctx.globalAlpha=1;
    ctx.restore();

    // 몸통
    ctx.beginPath(); ctx.ellipse(0,0,s*0.37,bh*0.5,0,0,Math.PI*2); ctx.fillStyle=this.bodyCol; ctx.fill();
    // 배
    ctx.beginPath(); ctx.ellipse(s*0.05,bh*0.12,s*0.2,bh*0.27,-0.3,0,Math.PI*2);
    ctx.fillStyle=this.bellyCol; ctx.globalAlpha=0.32; ctx.fill(); ctx.globalAlpha=1;
    // 등지느러미
    ctx.beginPath(); ctx.moveTo(s*0.1,-bh*0.45); ctx.quadraticCurveTo(-s*0.05,-bh*0.72,-s*0.2,-bh*0.45);
    ctx.fillStyle=this.finCol; ctx.globalAlpha=0.58; ctx.fill(); ctx.globalAlpha=1;
    // 아가미
    ctx.beginPath(); ctx.arc(s*0.14,0,bh*0.36,Math.PI-0.85,Math.PI+0.85);
    ctx.strokeStyle=this.finCol; ctx.lineWidth=1.2; ctx.globalAlpha=0.32; ctx.stroke(); ctx.globalAlpha=1;
    // 눈
    ctx.beginPath(); ctx.arc(-s*0.27,-bh*0.05,bh*0.14,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
    ctx.beginPath(); ctx.arc(-s*0.31,-bh*0.05,bh*0.08,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
    ctx.beginPath(); ctx.arc(-s*0.33,-bh*0.08,bh*0.033,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();

    ctx.restore(); ctx.shadowBlur=0;
    this.drawTag(ctx,cx,cy,s,bh);
  }
  drawTag(ctx,cx,cy,s,bh){
    const tailX=this.facingRight?cx-s*0.61:cx+s*0.61;
    const tailY=cy+Math.sin(this.swayPhase)*(bh*0.05);
    const swing=Math.sin(this.tagPhase)*5, ropLen=24+s*0.08;
    const tagX=tailX+swing, tagY=tailY+ropLen;

    // 줄
    ctx.beginPath(); ctx.moveTo(tailX,tailY);
    ctx.quadraticCurveTo(tailX+swing*0.5,tailY+ropLen*0.55,tagX,tagY);
    ctx.strokeStyle='rgba(0,0,0,.16)'; ctx.lineWidth=0.85; ctx.setLineDash([2.5,2.5]); ctx.stroke(); ctx.setLineDash([]);

    // 채널 뱃지
    const ch = (this.sub.channel || '').toLowerCase();
    const isYT = ch === 'youtube' || ch === '유튜브';
    const badgeColor  = isYT ? '#e8453c' : '#c2185b';
    const badgeLetter = isYT ? 'U' : 'I';

    // 뱃지 크기
    const badgeR = 7;
    const padX=6, padY=3, tagH=18;
    ctx.font = '300 10px "DM Mono",monospace';
    const nameW = ctx.measureText(this.sub.nickname).width;
    const tagW = badgeR*2 + 5 + nameW + padX*2;
    const tx = tagX - tagW/2;
    const ty = tagY;

    // 태그 배경
    ctx.roundRect(tx, ty, tagW, tagH, 5);
    ctx.fillStyle='rgba(255,255,255,0.93)'; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.1)'; ctx.lineWidth=0.5; ctx.stroke();

    // 원형 뱃지
    const bx = tx + padX - 1 + badgeR;
    const by = ty + tagH/2;
    ctx.beginPath(); ctx.arc(bx, by, badgeR, 0, Math.PI*2);
    ctx.fillStyle = badgeColor; ctx.fill();

    // 뱃지 글자
    ctx.font = 'bold 8px "DM Mono",monospace';
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(badgeLetter, bx, by);

    // 닉네임
    ctx.font = '300 10px "DM Mono",monospace';
    ctx.fillStyle = '#333';
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.fillText(this.sub.nickname, tx + padX + badgeR*2 + 5, ty + tagH - padY - 1);
  }
}

// ── 낚싯대 ──────────────────────────────────────────────
const rod={active:false,lineY:0,phase:'idle',winner:null,timer:0};
let isFishing=false, winnerQueue=[], winnerIdx=0;

function castNext(){
  const fish=winnerQueue[winnerIdx];
  rodCanvas.classList.add('visible');
  rod.active=true; rod.phase='dropping'; rod.lineY=22; rod.winner=fish; rod.timer=0;
}

function drawRod(){
  rctx.clearRect(0,0,W,H); if(!rod.active) return;
  const tipX=W/2, tipY=28;
  rctx.save(); rctx.lineCap='round';
  rctx.beginPath(); rctx.moveTo(tipX-70,-10); rctx.lineTo(tipX-105,20); rctx.strokeStyle='#5a3e0a'; rctx.lineWidth=11; rctx.stroke();
  rctx.beginPath(); rctx.moveTo(tipX-105,20); rctx.lineTo(tipX,tipY); rctx.strokeStyle='#9a7520'; rctx.lineWidth=5; rctx.stroke();
  rctx.restore();
  rctx.beginPath(); rctx.moveTo(tipX,tipY); rctx.lineTo(tipX,rod.lineY); rctx.strokeStyle='rgba(0,0,0,.28)'; rctx.lineWidth=1; rctx.stroke();
  rctx.beginPath(); rctx.arc(tipX,rod.lineY,5,0,Math.PI*2); rctx.fillStyle='#c0392b'; rctx.fill();
}

function updateRod(){
  if(!rod.active) return;
  rod.timer++;
  if(rod.phase==='dropping'){
    const t=rod.winner.y+rod.winner.size*0.3;
    rod.lineY+=(t-rod.lineY)*0.045;
    if(rod.timer>80&&Math.abs(rod.lineY-t)<8){ rod.phase='waiting'; rod.timer=0; }
  } else if(rod.phase==='waiting'){
    if(rod.timer>45){ rod.phase='pulling'; rod.timer=0; }
  } else if(rod.phase==='pulling'){
    rod.lineY-=4; rod.winner.y-=4;
    rod.winner.x+=(W/2-rod.winner.x-rod.winner.size/2)*0.07;
    if(rod.lineY<28){ rod.phase='done'; showWinner(rod.winner.sub); }
  }
}

async function showWinner(sub){
  document.getElementById('winnerChannel').textContent = sub.channel==='youtube' ? '🔴 YouTube' : '🟣 Instagram';
  document.getElementById('winnerName').textContent    = sub.nickname;
  const tmpl=document.getElementById('winnerTemplate');
  if(sub.template){ tmpl.textContent=`🎁 ${sub.template}`; tmpl.style.display='inline-block'; }
  else { tmpl.style.display='none'; }
  document.getElementById('winnerOverlay').classList.add('show');
  try{ await fetch(`${API}?type=catch&winner_id=${sub.id}`); } catch(e){}
}

document.getElementById('winnerOverlay').addEventListener('click', ()=>{
  document.getElementById('winnerOverlay').classList.remove('show');
  rodCanvas.classList.remove('visible');
  rod.active=false; rod.phase='idle'; rod.winner=null;
  winnerIdx++;
  if(winnerIdx < winnerQueue.length){
    setTimeout(()=>castNext(), 700);
  } else {
    // 남은 등록 상태 → 완료 처리 (구글시트 + 노션)
    try{ fetch(`${API}?type=closeWeek`); } catch(e){}
    fishList=[];
    isFishing=false;
    const btn=document.getElementById('fishBtn');
    btn.disabled=true; btn.textContent='이번 주 완료 ✓';
  }
});

function startFishing(){
  if(isFishing) return;
  const isYT = s => { const c=(s.sub.channel||'').toLowerCase(); return c==='youtube'||c==='유튜브'; };
  const isIG = s => { const c=(s.sub.channel||'').toLowerCase(); return c==='instagram'||c==='인스타그램'; };
  const ytPool=fishList.filter(f=>f.sub.eligible && isYT(f));
  const igPool=fishList.filter(f=>f.sub.eligible && isIG(f));
  winnerQueue=[];
  if(ytPool.length) winnerQueue.push(ytPool[Math.floor(Math.random()*ytPool.length)]);
  if(igPool.length) winnerQueue.push(igPool[Math.floor(Math.random()*igPool.length)]);
  if(!winnerQueue.length) return;
  isFishing=true; winnerIdx=0;
  document.getElementById('fishBtn').disabled=true;
  document.getElementById('fishBtn').textContent='낚시 중...';
  castNext();
}

// ── 거품 ─────────────────────────────────────────────────
function spawnBubble(){
  const b=document.createElement('div'); b.className='bubble';
  const sz=3+Math.random()*8, dur=5+Math.random()*5;
  b.style.cssText=`width:${sz}px;height:${sz}px;left:${6+Math.random()*88}%;bottom:65px;animation-duration:${dur}s;`;
  tankEl.appendChild(b); setTimeout(()=>b.remove(),dur*1000);
}

// ── 메인 루프 ────────────────────────────────────────────
let fishList=[];

function loop(){
  ctx.clearRect(0,0,W,H);
  fishList.forEach(f=>{ const frozen=rod.winner===f; f.update(frozen); f.draw(ctx,frozen); });
  updateRod(); drawRod();
  requestAnimationFrame(loop);
}

// ── 폴링: 5초마다 새 구독자 체크 ───────────────────────
let knownIds = new Set();

async function pollSubs(){
  if(isFishing) return; // 낚시 중엔 폴링 스킵
  try{
    const res  = await fetch(`${API}?type=subscribers`);
    const data = await res.json();

    let added = false;
    data.forEach(s => {
      if(!knownIds.has(s.id)){
        knownIds.add(s.id);
        fishList.push(new Fish(s));
        added = true;
      }
    });

    // 삭제된 구독자 제거
    const currentIds = new Set(data.map(s => s.id));
    fishList = fishList.filter(f => currentIds.has(f.sub.id));
    data.forEach(s => {
      const fish = fishList.find(f => f.sub.id === s.id);
      if(fish) fish.sub.eligible = s.eligible;
    });
    knownIds = currentIds;

  } catch(e){ console.warn('폴링 실패:',e); }
}

async function init(){
  resize();
  window.addEventListener('resize', ()=>{ resize(); });

  // 최초 로드
  await pollSubs();
  loop();
  setInterval(spawnBubble, 2000);

  // 5초마다 폴링
  setInterval(pollSubs, POLL_INTERVAL);
}

document.getElementById('fishBtn').addEventListener('click',startFishing);
window.addEventListener('load',init);
</script>
</body>
</html>
