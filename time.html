<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:      #ffffff;
      --text:    #2f2f2f;
      --muted:   #888;
      --line:    rgba(132,184,196,0.35);
      --accent:  #5d86c8;
      --danger:  #c96b6b;
      --success: #6bab7a;
      --radius:  10px;
    }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      overflow: hidden;
    }

    .wrap {
      width: 100%; height: 100vh;
      background: var(--bg);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 16px;
    }

    /* ── 세션 도트 ── */
    .dots {
      display: flex;
      gap: 5px;
      height: 10px;
      align-items: center;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(0,0,0,0.1);
      transition: background 0.3s;
    }
    .dot.done   { background: var(--accent); }
    .dot.active { background: var(--danger); }
    .dot.brk    { background: var(--success); }

    /* ── 타이머 ── */
    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .mode-lbl {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      transition: color 0.3s;
    }
    .mode-lbl.work { color: var(--danger); }
    .mode-lbl.brk  { color: var(--success); }

    /* SVG 링 */
    .ring-wrap {
      position: relative;
      width: 110px; height: 110px;
    }
    .ring-svg { width: 110px; height: 110px; transform: rotate(-90deg); }
    .ring-bg   { fill: none; stroke: rgba(132,184,196,0.18); stroke-width: 2.5; }
    .ring-prog {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 298;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.4s;
    }
    .ring-prog.work { stroke: var(--danger); }
    .ring-prog.brk  { stroke: var(--success); }

    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1px;
    }
    .time-txt {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1;
      transition: color 0.3s;
    }
    .time-txt.work { color: var(--danger); }
    .time-txt.brk  { color: var(--success); }
    .time-sub {
      font-size: 8px;
      letter-spacing: 0.1em;
      color: #888;
      font-weight: 600;
    }

    /* ── 컨트롤 ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn {
      border: none; background: transparent; cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.06em;
      color: #666;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 5px;
      transition: background 0.12s, color 0.12s;
      touch-action: manipulation;
    }
    .btn:hover  { background: rgba(0,0,0,0.05); color: var(--text); }
    .btn.prime {
      background: var(--accent); color: #fff;
      font-weight: 500; padding: 5px 18px; font-size: 11px;
    }
    .btn.prime:hover  { opacity: 0.85; }
    .btn.prime.work   { background: var(--danger); }
    .btn.prime.brk    { background: var(--success); }

    /* ── 구분선 ── */
    .hr { width: 100%; height: 1px; background: var(--line); }

    /* ── 설정 ── */
    .settings {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .srow {
      display: flex;
      align-items: center;
      height: 26px;
      gap: 6px;
    }
    .srow + .srow { border-top: 1px solid var(--line); }
    .slbl {
      font-size: 10px;
      color: var(--muted);
      width: 36px;
      flex-shrink: 0;
      font-weight: 600;
    }
    .sctrl {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .nbtn {
      border: none; background: transparent; cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 13px; color: var(--muted);
      width: 16px; height: 16px;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
      touch-action: manipulation; line-height: 1;
    }
    .nbtn:hover { background: rgba(0,0,0,0.06); color: var(--text); }

    /* 직접 입력 가능한 숫자 */
    .nval {
      font-size: 12px; font-weight: 700;
      color: var(--text);
      width: 28px; text-align: center;
      border: none; background: transparent;
      font-family: 'DM Mono', monospace;
      outline: none;
      cursor: text;
    }
    .nval:focus {
      background: rgba(93,134,200,0.08);
      border-radius: 3px;
    }
    /* 숫자 스피너 숨김 */
    .nval::-webkit-inner-spin-button,
    .nval::-webkit-outer-spin-button { -webkit-appearance: none; }
    .nval[type=number] { -moz-appearance: textfield; }

    .unit { font-size: 9px; color: var(--muted); margin-left: 1px; font-weight: 600; }

    /* 토글 */
    .tgl { position: relative; width: 28px; height: 16px; cursor: pointer; }
    .tgl input { opacity: 0; width: 0; height: 0; position: absolute; }
    .tgl-sl {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.12); border-radius: 8px;
      transition: background 0.2s;
    }
    .tgl-sl::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px; left: 2px; top: 2px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .tgl input:checked + .tgl-sl { background: var(--accent); }
    .tgl input:checked + .tgl-sl::before { transform: translateX(12px); }
    .tgl-lbl { font-size: 9px; color: var(--muted); }

    /* ── 상태 텍스트 ── */
    .status {
      font-size: 9px;
      letter-spacing: 0.06em;
      color: #777;
      font-weight: 600;
      height: 12px;
    }

    /* ── 토스트 ── */
    .toast {
      position: fixed; top: 10px; left: 50%;
      transform: translateX(-50%) translateY(-50px);
      background: var(--text); color: #fff;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.05em;
      padding: 6px 14px; border-radius: 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
      z-index: 100; white-space: nowrap;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="wrap">

  <div class="dots" id="dots"></div>

  <div class="timer-block">
    <div class="mode-lbl" id="modeLbl">준비</div>
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 110 110">
        <circle class="ring-bg"   cx="55" cy="55" r="47"/>
        <circle class="ring-prog" id="ringProg" cx="55" cy="55" r="47"/>
      </svg>
      <div class="ring-center">
        <div class="time-txt" id="timeTxt">25:00</div>
        <div class="time-sub" id="timeSub">focus</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="resetBtn">reset</button>
    <button class="btn prime" id="startBtn">start</button>
    <button class="btn" id="skipBtn">skip</button>
  </div>

  <div class="hr"></div>

  <div class="settings">
    <div class="srow">
      <span class="slbl">집중</span>
      <div class="sctrl">
        <button class="nbtn" data-t="work" data-d="-1">−</button>
        <input class="nval" type="number" id="workVal" value="25" min="1" max="99"/>
        <button class="nbtn" data-t="work" data-d="1">+</button>
        <span class="unit">분</span>
      </div>
    </div>
    <div class="srow">
      <span class="slbl">휴식</span>
      <div class="sctrl">
        <button class="nbtn" data-t="brk" data-d="-1">−</button>
        <input class="nval" type="number" id="brkVal" value="5" min="1" max="30"/>
        <button class="nbtn" data-t="brk" data-d="1">+</button>
        <span class="unit">분</span>
      </div>
    </div>
    <div class="srow">
      <span class="slbl">반복</span>
      <div class="sctrl">
        <button class="nbtn" data-t="rounds" data-d="-1">−</button>
        <input class="nval" type="number" id="roundsVal" value="4" min="1" max="12"/>
        <button class="nbtn" data-t="rounds" data-d="1">+</button>
        <span class="unit">회</span>
      </div>
    </div>
    <div class="srow">
      <span class="slbl">알림</span>
      <div class="sctrl" style="gap:6px;">
        <label class="tgl">
          <input type="checkbox" id="notiTgl" checked/>
          <span class="tgl-sl"></span>
        </label>
        <span class="tgl-lbl" id="notiLbl">on</span>
      </div>
    </div>
  </div>

  <div class="status" id="statusTxt">타이머를 시작하세요</div>
</div>

<div class="toast" id="toast"></div>

<script>
const CIRC = 2 * Math.PI * 47; // ≈ 295

const s = {
  work: 25, brk: 5, rounds: 4, notify: true,
  phase: 'idle', round: 0,
  total: 0, remain: 0,
  tmr: null, running: false
};

const $ = id => document.getElementById(id);
const ringProg = $('ringProg');
const timeTxt  = $('timeTxt');
const timeSub  = $('timeSub');
const modeLbl  = $('modeLbl');
const startBtn = $('startBtn');
const statusTxt= $('statusTxt');
const toast    = $('toast');

function fmt(sec){ return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0'); }

function setRing(remain, total){
  const off = total>0 ? CIRC*(1-remain/total) : 0;
  ringProg.style.strokeDasharray  = CIRC;
  ringProg.style.strokeDashoffset = off;
}

function renderDots(){
  let h='';
  for(let i=0;i<s.rounds;i++){
    let c='dot';
    if(i<s.round) c+=' done';
    else if(i===s.round && s.phase==='work' && s.running) c+=' active';
    else if(i===s.round && s.phase==='brk') c+=' brk';
    h+=`<div class="${c}"></div>`;
  }
  $('dots').innerHTML=h;
}

function applyStyle(phase){
  ['work','brk'].forEach(c=>{
    timeTxt.classList.remove(c);
    modeLbl.classList.remove(c);
    ringProg.classList.remove(c);
    startBtn.classList.remove(c);
  });
  if(phase==='work'||phase==='brk'){
    timeTxt.classList.add(phase);
    modeLbl.classList.add(phase);
    ringProg.classList.add(phase);
    startBtn.classList.add(phase);
  }
}

function render(){
  timeTxt.textContent = fmt(s.remain);
  setRing(s.remain, s.total);
  renderDots();
  if(s.phase==='work'){
    modeLbl.textContent = `${s.round+1}/${s.rounds} 집중`;
    timeSub.textContent = 'focus';
    statusTxt.textContent = s.running ? '집중하는 중...' : '집중 준비됨';
  } else if(s.phase==='brk'){
    modeLbl.textContent = '휴식';
    timeSub.textContent = 'break';
    statusTxt.textContent = s.running ? '잠깐 쉬어요 ☕' : '휴식 준비됨';
  } else {
    modeLbl.textContent = '준비';
    timeSub.textContent = 'ready';
    statusTxt.textContent = '타이머를 시작하세요';
  }
  startBtn.textContent = s.running ? 'pause' : 'start';
  applyStyle(s.phase);
}

function initWork(){ s.phase='work'; s.total=s.work*60; s.remain=s.total; }
function initBrk(){  s.phase='brk';  s.total=s.brk*60;  s.remain=s.total; }

let toastT;
function showToast(msg){
  toast.textContent=msg; toast.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>toast.classList.remove('show'),2600);
}

function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,150,300].forEach(d=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880; o.type='sine';
      const t=ctx.currentTime+d/1000;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.15,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.start(t); o.stop(t+0.35);
    });
  }catch{}
}

function notify(msg){
  showToast(msg);
  if(!s.notify) return;
  beep();
  if(Notification.permission==='granted') new Notification('Pomodoro',{body:msg});
  else if(Notification.permission!=='denied') Notification.requestPermission().then(p=>{ if(p==='granted') new Notification('Pomodoro',{body:msg}); });
}

function tick(){
  if(s.remain<=0){ clearInterval(s.tmr); s.running=false; onEnd(); return; }
  s.remain--; render();
}

function onEnd(){
  if(s.phase==='work'){
    s.round++;
    if(s.round>=s.rounds){
      notify('🎉 모든 세션 완료!');
      s.phase='idle'; s.round=0; s.remain=s.work*60; s.total=s.work*60;
      render();
    } else {
      notify('☕ 집중 완료! 잠깐 쉬어요');
      initBrk(); autoStart();
    }
  } else {
    notify('💪 휴식 끝! 다시 집중해요');
    initWork(); autoStart();
  }
}

function autoStart(){ s.running=true; s.tmr=setInterval(tick,1000); render(); }

startBtn.addEventListener('click',()=>{
  if(s.phase==='idle'){ s.round=0; initWork(); }
  if(s.running){ clearInterval(s.tmr); s.running=false; }
  else{
    if(s.notify && Notification.permission==='default') Notification.requestPermission();
    s.running=true; s.tmr=setInterval(tick,1000);
  }
  render();
});

$('resetBtn').addEventListener('click',()=>{
  clearInterval(s.tmr); s.running=false; s.phase='idle'; s.round=0;
  s.remain=s.work*60; s.total=s.work*60;
  render(); setRing(1,1);
});

$('skipBtn').addEventListener('click',()=>{
  clearInterval(s.tmr); s.running=false;
  if(s.phase==='work'||s.phase==='idle'){
    s.round=Math.min(s.round+1,s.rounds);
    if(s.round>=s.rounds){ s.phase='idle'; s.round=0; s.remain=s.work*60; s.total=s.work*60; render(); }
    else{ initBrk(); render(); }
  } else { initWork(); render(); }
});

/* 설정 버튼 (+/-) */
document.querySelectorAll('.nbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t=btn.dataset.t, d=parseInt(btn.dataset.d);
    const inp=$(t==='work'?'workVal':t==='brk'?'brkVal':'roundsVal');
    let v=parseInt(inp.value)||0;
    if(t==='work')   v=Math.max(1,Math.min(99,v+d));
    if(t==='brk')    v=Math.max(1,Math.min(30,v+d));
    if(t==='rounds') v=Math.max(1,Math.min(12,v+d));
    inp.value=v;
    applyVal(t,v);
  });
});

/* 직접 입력 */
['workVal','brkVal','roundsVal'].forEach(id=>{
  $(id).addEventListener('change',()=>{
    const t=id==='workVal'?'work':id==='brkVal'?'brk':'rounds';
    let v=parseInt($(id).value)||1;
    if(t==='work')   v=Math.max(1,Math.min(99,v));
    if(t==='brk')    v=Math.max(1,Math.min(30,v));
    if(t==='rounds') v=Math.max(1,Math.min(12,v));
    $(id).value=v;
    applyVal(t,v);
  });
  /* 엔터로 확정 */
  $(id).addEventListener('keydown',e=>{ if(e.key==='Enter') $(id).blur(); });
});

function applyVal(t,v){
  if(t==='work'){
    s.work=v;
    if(s.phase==='idle'||(!s.running&&s.phase==='work')){ s.remain=v*60; s.total=v*60; setRing(1,1); timeTxt.textContent=fmt(s.remain); }
  } else if(t==='brk'){
    s.brk=v;
    if(!s.running&&s.phase==='brk'){ s.remain=v*60; s.total=v*60; timeTxt.textContent=fmt(s.remain); }
  } else {
    s.rounds=v; renderDots();
  }
}

$('notiTgl').addEventListener('change',()=>{
  s.notify=$('notiTgl').checked;
  $('notiLbl').textContent=s.notify?'on':'off';
});

/* 초기 */
s.remain=s.work*60; s.total=s.work*60;
setRing(1,1); render();
</script>
</body>
</html>
