<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:      #ffffff;
      --text:    #1e1e1e;
      --muted:   #bbb;
      --line:    #f0f0f0;
      --accent:  #5d86c8;
      --accent-l:#edf2fb;
      --danger:  #c96b6b;
    }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    .wrap {
      width: 100%; height: 100vh;
      background: var(--bg);
      border-radius: 12px;
      border: 2px solid #d8d8d8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 16px 10px;
      gap: 8px;
    }

    /* ── 헤더: ‹ 2026년 3월 › ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }
    .nav-btn {
      border: none; background: transparent; cursor: pointer;
      font-size: 16px; font-weight: 800;
      color: var(--accent);
      width: 24px; height: 24px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
      touch-action: manipulation;
      line-height: 1;
    }
    .nav-btn:hover  { background: var(--accent-l); }
    .nav-btn:active { background: #dce8f8; }
    .title {
      font-size: 14px; font-weight: 800;
      color: var(--text); letter-spacing: -0.01em;
      min-width: 96px; text-align: center;
    }

    /* ── 요일 ── */
    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      width: 100%;
    }
    .dow {
      text-align: center;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--muted);
      padding: 2px 0 4px;
    }
    .dow.sun { color: var(--danger); }
    .dow.sat { color: var(--accent); }

    /* ── 날짜 그리드 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 2px;
      width: 100%;
      flex: 1;
    }
    .dc {
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      font-size: 13px; font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      touch-action: manipulation;
      min-height: 0;
    }
    .dc:hover   { background: var(--accent-l); }
    .dc.empty   { pointer-events: none; }
    .dc.sun     { color: var(--danger); }
    .dc.sat     { color: var(--accent); }
    .dc.today   { background: var(--accent); color: #fff; font-weight: 800; }
    .dc.today:hover { background: #4a73b5; }
    .dc.today.sun,
    .dc.today.sat   { color: #fff; }
    .dc.sel     { outline: 2px solid var(--accent); outline-offset: -2px; font-weight: 800; color: var(--accent); }
    .dc.today.sel { outline: none; color: #fff; }

    /* ── 푸터 ── */
    .footer {
      display: flex; align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .today-btn {
      border: none; background: var(--accent-l);
      color: var(--accent); cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 800;
      padding: 4px 10px; border-radius: 5px;
      touch-action: manipulation;
      transition: background 0.1s;
    }
    .today-btn:hover { background: #dce8f8; }
    .sel-lbl {
      font-size: 11px; font-weight: 700;
      color: var(--muted);
    }
    .sel-lbl b { color: var(--accent); font-weight: 800; }

    .credit {
      position: fixed; bottom: 5px; right: 8px;
      font-size: 9px; font-weight: 700; color: #ccc;
      pointer-events: none; z-index: 10;
      font-family: 'Nunito', sans-serif;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="title" id="title"></div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  <div class="dow-row" id="dowRow"></div>
  <div class="grid" id="grid"></div>
  <div class="footer">
    <button class="today-btn" id="todayBtn">오늘</button>
    <div class="sel-lbl" id="selLbl"></div>
  </div>
</div>
<div class="credit">© Clonote</div>

<script>
const DOW   = ['일','월','화','수','목','금','토'];
const now   = new Date();
let cy = now.getFullYear(), cm = now.getMonth();
let sel = null;

const $ = id => document.getElementById(id);

// 요일 헤더
$('dowRow').innerHTML = DOW.map((d,i) =>
  `<div class="dow${i===0?' sun':i===6?' sat':''}">${d}</div>`
).join('');

function render() {
  $('title').textContent = `${cy}년 ${cm+1}월`;
  const first = new Date(cy, cm, 1).getDay();
  const last  = new Date(cy, cm+1, 0).getDate();
  let html = '';
  for (let i=0; i<first; i++) html += `<div class="dc empty"></div>`;
  for (let d=1; d<=last; d++) {
    const dow = new Date(cy, cm, d).getDay();
    let cls = 'dc';
    if (dow===0) cls += ' sun';
    if (dow===6) cls += ' sat';
    if (cy===now.getFullYear() && cm===now.getMonth() && d===now.getDate()) cls += ' today';
    if (sel && sel.y===cy && sel.m===cm && sel.d===d) cls += ' sel';
    html += `<div class="${cls}" data-d="${d}">${d}</div>`;
  }
  $('grid').innerHTML = html;
  $('grid').querySelectorAll('.dc:not(.empty)').forEach(el =>
    el.addEventListener('click', () => {
      sel = {y:cy, m:cm, d:+el.dataset.d};
      render();
    })
  );
  if (sel) {
    const dow = new Date(sel.y, sel.m, sel.d).getDay();
    $('selLbl').innerHTML = `<b>${sel.m+1}월 ${sel.d}일</b> ${DOW[dow]}`;
  } else {
    $('selLbl').textContent = '';
  }
}

$('prevBtn').addEventListener('click', () => { cm--; if(cm<0){cm=11;cy--;} render(); });
$('nextBtn').addEventListener('click', () => { cm++; if(cm>11){cm=0;cy++;} render(); });
$('todayBtn').addEventListener('click', () => {
  cy=now.getFullYear(); cm=now.getMonth();
  sel={y:cy,m:cm,d:now.getDate()}; render();
});

render();
</script>
</body>
</html>
