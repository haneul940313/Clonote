<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어항</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Gowun+Dodum&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --yt: #e8453c;
    --ig: #7b3fa0;
    --sand: #ddd4b8;
    --sand-dark: #c4b898;
  }

  body {
    background: #eef2ee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Gowun Dodum', sans-serif;
    padding: 24px;
  }

  .tank-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: #999;
    letter-spacing: 0.14em;
    text-align: center;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .tank-wrap {
    position: relative;
    width: min(720px, 100%);
  }

  .tank {
    position: relative;
    width: 100%;
    height: 440px;
    background: linear-gradient(180deg, #cce8f5 0%, #b4d8ee 65%, #8ec4e0 100%);
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.55);
    box-shadow:
      inset 0 0 50px rgba(255,255,255,0.18),
      inset 3px 3px 0 rgba(255,255,255,0.38),
      0 10px 40px rgba(80,140,190,0.2);
    overflow: hidden;
  }

  .tank::before {
    content: '';
    position: absolute;
    top: 0; left: 10px;
    width: 22px; height: 100%;
    background: linear-gradient(90deg, rgba(255,255,255,0.2), transparent);
    border-radius: 8px;
    pointer-events: none;
    z-index: 10;
  }

  .surface {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 16px;
    background: rgba(255,255,255,0.22);
    border-radius: 14px 14px 0 0;
    pointer-events: none;
    z-index: 8;
  }

  .sand {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    background: linear-gradient(180deg, var(--sand) 0%, var(--sand-dark) 100%);
    border-radius: 0 0 12px 12px;
    pointer-events: none;
    z-index: 8;
  }
  .sand::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background:
      radial-gradient(ellipse 50% 100% at 25% 50%, rgba(255,255,255,0.25), transparent),
      radial-gradient(ellipse 40% 100% at 72% 50%, rgba(255,255,255,0.18), transparent);
  }

  .plants {
    position: absolute;
    bottom: 42px;
    left: 0; right: 0;
    pointer-events: none;
    z-index: 7;
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.42);
    border: 1px solid rgba(255,255,255,0.6);
    pointer-events: none;
    z-index: 4;
    animation: riseUp linear forwards;
  }
  @keyframes riseUp {
    0%   { opacity: 0.7; transform: translateY(0) translateX(0px); }
    50%  { transform: translateY(-200px) translateX(5px); }
    100% { opacity: 0; transform: translateY(-400px) translateX(-3px); }
  }

  #fishCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 3;
  }

  #rodCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 9;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s;
  }
  #rodCanvas.visible { opacity: 1; }

  .bottom-ui {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding: 0 4px;
  }

  .legend {
    display: flex;
    gap: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #777;
  }
  .legend-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .fish-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #555;
    background: white;
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 20px;
    padding: 7px 18px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .fish-btn:hover  { background: #f5f5f5; }
  .fish-btn:active { transform: scale(0.97); }
  .fish-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* 당첨 오버레이 */
  .winner-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    border-radius: 12px;
  }
  .winner-overlay.show { opacity: 1; pointer-events: auto; }

  .winner-card {
    background: white;
    border-radius: 14px;
    border: 0.5px solid rgba(0,0,0,0.08);
    padding: 30px 40px;
    text-align: center;
    cursor: pointer;
  }
  .winner-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .winner-name {
    font-size: 26px;
    font-weight: 400;
    color: #1a1a1a;
    margin-bottom: 5px;
  }
  .winner-handle {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 20px;
  }
  .winner-close {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #ccc;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<div class="tank-wrap">

        <path d="M672 88 Q676 60 684 36 Q690 16 680 6" stroke="#4a8a58" stroke-width="1.7" fill="none" stroke-linecap="round"/>
        <ellipse cx="660" cy="7" rx="8" ry="4.5" fill="#6ab078" transform="rotate(-18,660,7)"/>

  <div class="bottom-ui">
    <div class="legend">
      <span><span class="legend-dot" style="background:var(--yt)"></span>YouTube</span>
      <span><span class="legend-dot" style="background:var(--ig)"></span>Instagram</span>
    </div>
    <button class="fish-btn" id="fishBtn">🎣 낚시하기</button>
  </div>

<script>
const WEB_APP_URL = 'YOUR_WEB_APP_URL_HERE';

const SAMPLE_DATA = [
  { id:1, nickname:'바다물고기', channel:'youtube',   handle:'@ocean_fish',    eligible:true  },
  { id:2, nickname:'별빛가오리', channel:'instagram', handle:'@starray_gram',  eligible:true  },
  { id:3, nickname:'노랑복어',   channel:'youtube',   handle:'@puffer_yellow', eligible:false },
  { id:4, nickname:'분홍돌고래', channel:'instagram', handle:'@pink_dolphin',  eligible:true  },
  { id:5, nickname:'초록해마',   channel:'youtube',   handle:'@seahorse_g',    eligible:true  },
  { id:6, nickname:'은빛청어',   channel:'instagram', handle:'@silver_herring',eligible:true  },
  { id:7, nickname:'파랑고래',   channel:'youtube',   handle:'@blue_whale7',   eligible:true  },
  { id:8, nickname:'작은새우',   channel:'instagram', handle:'@tiny_shrimp',   eligible:true  },
];

const tankEl    = document.getElementById('tank');
const canvas    = document.getElementById('fishCanvas');
const rodCanvas = document.getElementById('rodCanvas');
const ctx       = canvas.getContext('2d');
const rctx      = rodCanvas.getContext('2d');

const SAND_H = 50, TOP_H = 16;
let W, H;

function resize() {
  W = tankEl.offsetWidth;
  H = tankEl.offsetHeight;
  canvas.width    = W; canvas.height    = H;
  rodCanvas.width = W; rodCanvas.height = H;
}

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

// ── Fish 클래스 ──────────────────────────────────────────
class Fish {
  constructor(sub) {
    this.sub = sub;
    this.size = 42 + Math.random() * 22;
    this.isYT = sub.channel === 'youtube';
    this.genColors();
    this.tailPhase  = Math.random() * Math.PI * 2;
    this.swayPhase  = Math.random() * Math.PI * 2;
    this.tagPhase   = Math.random() * Math.PI * 2;
    this.place();
  }

  genColors() {
    if (this.isYT) {
      const h = 2 + Math.floor(Math.random() * 10);
      this.bodyCol  = `hsl(${h},80%,58%)`;
      this.finCol   = `hsl(${h},80%,36%)`;
      this.bellyCol = `hsl(${h},55%,78%)`;
    } else {
      const h = 265 + Math.floor(Math.random() * 26);
      this.bodyCol  = `hsl(${h},54%,55%)`;
      this.finCol   = `hsl(${h},54%,34%)`;
      this.bellyCol = `hsl(${h},38%,75%)`;
    }
  }

  place() {
    const minY = TOP_H + 14;
    const maxY = H - SAND_H - this.size * 0.6 - 30;
    this.x = 60 + Math.random() * (W - 120 - this.size);
    this.y = minY + Math.random() * Math.max(0, maxY - minY);
    const spd = 0.18 + Math.random() * 0.22;
    const ang = (Math.random() - 0.5) * 0.4;
    const dir = Math.random() > 0.5 ? 1 : -1;
    this.vx = dir * spd * Math.cos(ang);
    this.vy = spd * Math.sin(ang) * 0.3;
    this.facingRight = this.vx > 0;
  }

  update(frozen) {
    if (frozen) return;

    this.tailPhase += 0.13;
    this.swayPhase += 0.04 + Math.random() * 0.01;
    this.tagPhase  += 0.025 + Math.random() * 0.01;

    // 부드러운 방향 흔들림
    this.vx += (Math.random() - 0.5) * 0.012;
    this.vy += (Math.random() - 0.5) * 0.008;

    // 속도 제한
    const spd = Math.hypot(this.vx, this.vy);
    const maxSpd = 0.45;
    const minSpd = 0.1;
    if (spd > maxSpd) { this.vx *= maxSpd/spd; this.vy *= maxSpd/spd; }
    if (spd < minSpd && spd > 0) { this.vx *= minSpd/spd; this.vy *= minSpd/spd; }

    // 경계 처리
    const minY = TOP_H + 10;
    const maxY = H - SAND_H - this.size * 0.6 - 12;
    const margin = 36;

    if (this.x < margin) {
      this.vx = Math.abs(this.vx) + 0.2;
      this.facingRight = true;
    }
    if (this.x > W - margin - this.size) {
      this.vx = -(Math.abs(this.vx) + 0.2);
      this.facingRight = false;
    }
    if (this.y < minY) { this.vy = Math.abs(this.vy) * 0.7; this.y = minY; }
    if (this.y > maxY) { this.vy = -Math.abs(this.vy) * 0.7; this.y = maxY; }

    if (Math.abs(this.vx) > 0.12) this.facingRight = this.vx > 0;

    this.x += this.vx;
    this.y += this.vy;
  }

  draw(ctx, isHooked) {
    const s  = this.size;
    const bh = s * 0.55;
    const cx = this.x + s / 2;
    const cy = this.y + bh / 2;

    ctx.save();
    ctx.translate(cx, cy);
    // 기본 그림이 왼쪽을 바라봄 — 오른쪽 갈 때만 뒤집기
    if (this.facingRight) ctx.scale(-1, 1);

    // 흔들림
    const sway = Math.sin(this.swayPhase) * 0.05;
    ctx.rotate(sway);

    if (isHooked) {
      ctx.shadowColor = 'rgba(255,200,0,0.75)';
      ctx.shadowBlur  = 14;
    }

    // 꼬리 — 오른쪽(+x)에 위치
    const tw = Math.sin(this.tailPhase) * 0.3;
    ctx.save();
    ctx.translate(s * 0.33, 0);
    ctx.rotate(tw);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(s * 0.32, -bh * 0.44);
    ctx.lineTo(s * 0.26, 0);
    ctx.lineTo(s * 0.32,  bh * 0.44);
    ctx.closePath();
    ctx.fillStyle = this.finCol;
    ctx.globalAlpha = 0.9;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();

    // 몸통
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.37, bh * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = this.bodyCol;
    ctx.fill();

    // 배 하이라이트
    ctx.beginPath();
    ctx.ellipse(s*0.05, bh*0.12, s*0.2, bh*0.27, -0.3, 0, Math.PI*2);
    ctx.fillStyle = this.bellyCol;
    ctx.globalAlpha = 0.32;
    ctx.fill();
    ctx.globalAlpha = 1;

    // 등지느러미
    ctx.beginPath();
    ctx.moveTo(s*0.1, -bh*0.45);
    ctx.quadraticCurveTo(-s*0.05, -bh*0.72, -s*0.2, -bh*0.45);
    ctx.fillStyle = this.finCol;
    ctx.globalAlpha = 0.58;
    ctx.fill();
    ctx.globalAlpha = 1;

    // 아가미
    ctx.beginPath();
    ctx.arc(s*0.14, 0, bh*0.36, Math.PI - 0.85, Math.PI + 0.85);
    ctx.strokeStyle = this.finCol;
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.32;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // 눈 — 왼쪽에 위치 (머리 쪽)
    ctx.beginPath();
    ctx.arc(-s*0.27, -bh*0.05, bh*0.14, 0, Math.PI*2);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-s*0.26, -bh*0.05, bh*0.08, 0, Math.PI*2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-s*0.28, -bh*0.09, bh*0.033, 0, Math.PI*2);
    ctx.fillStyle = 'white';
    ctx.fill();

    ctx.restore();
    ctx.shadowBlur = 0;

    // 이름표 — scaleX 영향 없는 세계좌표에서 그림
    this.drawTag(ctx, isHooked, cx, cy, s, bh);
  }

  drawTag(ctx, isHooked, cx, cy, s, bh) {
    // 기본 그림에서 꼬리는 +x(오른쪽)에 있음
    // facingRight면 그림이 뒤집혀서 꼬리가 실제로는 왼쪽
    const tailLocalX = s * 0.61;
    const tailX = this.facingRight
      ? cx - tailLocalX
      : cx + tailLocalX;
    const tailY = cy + Math.sin(this.swayPhase) * (bh * 0.05);

    // 이름표 흔들림 (꼬리에서 아래로 늘어짐)
    const swing   = Math.sin(this.tagPhase) * 5;
    const tagX    = tailX + swing;
    const ropeLen = 22 + s * 0.08;
    const tagY    = tailY + ropeLen;

    // 줄 — quadratic curve로 자연스럽게
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    const cp1x = tailX + swing * 0.5;
    const cp1y = tailY + ropeLen * 0.55;
    ctx.quadraticCurveTo(cp1x, cp1y, tagX, tagY);
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 0.85;
    ctx.setLineDash([2.5, 2.5]);
    ctx.stroke();
    ctx.setLineDash([]);

    // 이름표
    ctx.font = '300 10px "DM Mono", monospace';
    const tw   = ctx.measureText(this.sub.nickname).width;
    const padX = 7, padY = 3;
    const tagW = tw + padX * 2;
    const tagH = 17;
    const tx   = tagX - tagW / 2;
    const ty   = tagY;

    ctx.roundRect(tx, ty, tagW, tagH, 4);
    ctx.fillStyle = 'rgba(255,255,255,0.93)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    ctx.fillStyle = '#333';
    ctx.fillText(this.sub.nickname, tx + padX, ty + tagH - padY - 1);
  }
}

// ── 낚싯대 상태 ──────────────────────────────────────────
const rod = {
  active: false,
  lineY: 0,
  phase: 'idle',   // idle | dropping | waiting | pulling | done
  winner: null,
  timer: 0,
};

function drawRod() {
  rctx.clearRect(0, 0, W, H);
  if (!rod.active) return;

  const tipX = W / 2;
  const tipY = 22;

  // 낚싯대 몸통
  rctx.save();
  rctx.lineCap = 'round';
  // 그립
  rctx.beginPath();
  rctx.moveTo(tipX - 55, -8);
  rctx.lineTo(tipX - 82, 16);
  rctx.strokeStyle = '#5a3e0a';
  rctx.lineWidth = 9;
  rctx.stroke();
  // 대
  rctx.beginPath();
  rctx.moveTo(tipX - 82, 16);
  rctx.lineTo(tipX, tipY);
  rctx.strokeStyle = '#9a7520';
  rctx.lineWidth = 4;
  rctx.stroke();
  rctx.restore();

  // 낚싯줄
  rctx.beginPath();
  rctx.moveTo(tipX, tipY);
  rctx.lineTo(tipX, rod.lineY);
  rctx.strokeStyle = 'rgba(0,0,0,0.28)';
  rctx.lineWidth = 0.9;
  rctx.stroke();

  // 찌
  rctx.beginPath();
  rctx.arc(tipX, rod.lineY, 4, 0, Math.PI*2);
  rctx.fillStyle = '#c0392b';
  rctx.fill();
}

function updateRod(fishList) {
  if (!rod.active) return;
  rod.timer++;

  if (rod.phase === 'dropping') {
    const target = rod.winner.y + rod.winner.size * 0.3;
    rod.lineY += (target - rod.lineY) * 0.045;
    if (rod.timer > 80 && Math.abs(rod.lineY - target) < 8) {
      rod.phase = 'waiting';
      rod.timer = 0;
    }
  } else if (rod.phase === 'waiting') {
    if (rod.timer > 45) {
      rod.phase = 'pulling';
      rod.timer = 0;
    }
  } else if (rod.phase === 'pulling') {
    rod.lineY -= 4;
    // 물고기 딸려오기
    rod.winner.y -= 4;
    rod.winner.x += (W/2 - rod.winner.x - rod.winner.size/2) * 0.07;
    if (rod.lineY < 22) {
      rod.phase = 'done';
      showWinner(rod.winner.sub);
    }
  }
}

// ── 당첨 표시 ────────────────────────────────────────────
function showWinner(sub) {
  document.getElementById('winnerName').textContent   = sub.nickname;
  document.getElementById('winnerHandle').textContent = sub.handle;
  document.getElementById('winnerOverlay').classList.add('show');
}

document.getElementById('winnerOverlay').addEventListener('click', () => {
  document.getElementById('winnerOverlay').classList.remove('show');
  rodCanvas.classList.remove('visible');
  rod.active = false;
  rod.phase  = 'idle';
  rod.winner = null;

  // 어항 전체 비우기 — 모든 물고기 제거
  fishList = [];

  isFishing = false;
  const btn = document.getElementById('fishBtn');
  btn.disabled    = true;
  btn.textContent = '이번 주 완료 ✓';
});

// ── 낚시 시작 ────────────────────────────────────────────
let fishList = [];
let isFishing = false;

function startFishing() {
  if (isFishing) return;
  const eligible = fishList.filter(f => f.sub.eligible);
  if (!eligible.length) return;

  isFishing = true;
  const btn = document.getElementById('fishBtn');
  btn.disabled    = true;
  btn.textContent = '낚시 중...';

  rodCanvas.classList.add('visible');
  rod.active  = true;
  rod.phase   = 'dropping';
  rod.lineY   = 22;
  rod.winner  = eligible[Math.floor(Math.random() * eligible.length)];
  rod.timer   = 0;
}

// ── 거품 ─────────────────────────────────────────────────
function spawnBubble() {
  const b   = document.createElement('div');
  b.className = 'bubble';
  const sz  = 3 + Math.random() * 7;
  const dur = 4.5 + Math.random() * 4;
  b.style.cssText = `width:${sz}px;height:${sz}px;left:${8+Math.random()*84}%;bottom:55px;animation-duration:${dur}s;`;
  tankEl.appendChild(b);
  setTimeout(() => b.remove(), dur * 1000);
}

// ── 메인 루프 ────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);
  fishList.forEach(f => {
    const frozen = rod.winner === f;
    f.update(frozen);
    f.draw(ctx, frozen);
  });
  updateRod(fishList);
  drawRod();
  requestAnimationFrame(loop);
}

// ── 초기화 ───────────────────────────────────────────────
async function init() {
  resize();
  window.addEventListener('resize', resize);

  let data;
  if (WEB_APP_URL === 'YOUR_WEB_APP_URL_HERE') {
    data = SAMPLE_DATA;
  } else {
    try {
      const res = await fetch(`${WEB_APP_URL}?type=subscribers`);
      data = await res.json();
    } catch(e) { data = SAMPLE_DATA; }
  }

  fishList = data.map(s => new Fish(s));
  loop();
  setInterval(spawnBubble, 2200);
}

document.getElementById('fishBtn').addEventListener('click', startFishing);
window.addEventListener('load', init);
</script>
</body>
